<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodeLocker Security Maturity Assessment</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    body { 
      font-family: 'IBM Plex Sans', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      background-attachment: fixed;
    }
    .main-container {
      background: white;
      min-height: 100vh;
    }
    .hero-gradient {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .card-shadow {
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
    }
    .maturity-level-0 { background: linear-gradient(135deg, #fee2e2 0%, #fca5a5 100%); }
    .maturity-level-1 { background: linear-gradient(135deg, #fed7aa 0%, #fb923c 100%); }
    .maturity-level-2 { background: linear-gradient(135deg, #fef08a 0%, #facc15 100%); }
    .maturity-level-3 { background: linear-gradient(135deg, #bbf7d0 0%, #4ade80 100%); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const MATURITY_DOMAINS = {
      governance: {
        title: "People & Governance",
        questions: [
          {
            id: "gov_1",
            text: "Does your organization have executive-level support for software supply chain security?",
            levels: {
              0: "No executive awareness or support",
              1: "Some executives aware, but no formal commitment",
              2: "Executive sponsor assigned with budget allocation",
              3: "C-suite driven initiative with board oversight"
            }
          },
          {
            id: "gov_2",
            text: "Are security roles and responsibilities clearly defined across development teams?",
            levels: {
              0: "Roles undefined; individuals pursue ad-hoc security efforts",
              1: "Basic security roles identified but not formalized",
              2: "Formal roles with clear responsibilities and escalation paths",
              3: "Centralized governance with Expert Review Boards for security standards"
            }
          },
          {
            id: "gov_3",
            text: "How are encryption and cryptographic policies managed?",
            levels: {
              0: "No formal policies; keys hard-coded or stored insecurely",
              1: "Basic policies exist but enforcement is manual",
              2: "Documented policies with some automation",
              3: "Centralized HSM-based key management with automated enforcement"
            }
          }
        ]
      },
      training: {
        title: "Training & Culture",
        questions: [
          {
            id: "train_1",
            text: "What level of security training do developers receive?",
            levels: {
              0: "No formal security training",
              1: "Basic training on common vulnerabilities for some staff",
              2: "Mandatory security training for all development personnel",
              3: "Continuous learning with specialized training on supply chain threats"
            }
          },
          {
            id: "train_2",
            text: "Is there a culture of security awareness across the organization?",
            levels: {
              0: "Security seen as obstacle; developers actively circumvent controls",
              1: "Growing awareness but still treated as compliance checkbox",
              2: "Security culture established; treated as shared responsibility",
              3: "Security is integral to development; addressed throughout lifecycle"
            }
          },
          {
            id: "train_3",
            text: "Can your team identify and remediate unintentional code vulnerabilities?",
            levels: {
              0: "No capability to identify vulnerabilities proactively",
              1: "Reactive responses to external vulnerability reports",
              2: "Regular scanning with manual review processes",
              3: "Automated detection with skilled personnel for complex analysis"
            }
          }
        ]
      },
      supplyChain: {
        title: "Supply Chain Integrity",
        questions: [
          {
            id: "sc_1",
            text: "How do you verify the integrity of third-party software and dependencies?",
            levels: {
              0: "Implicit trust in all components; no verification",
              1: "Basic SBOM awareness; manual review of some critical dependencies",
              2: "Automated SBOM generation; shift-left security in CI/CD",
              3: "Continuous validation with reproducible builds and verified trust chains"
            }
          },
          {
            id: "sc_2",
            text: "How are software artifacts signed and verified?",
            levels: {
              0: "No code signing; binaries deployed without verification",
              1: "Ad-hoc code signing for some critical releases",
              2: "Consistent code signing with manual key management",
              3: "Automated commit-to-deployment signing with HSM-backed keys"
            }
          },
          {
            id: "sc_3",
            text: "Do you inspect closed-source third-party binaries before deployment?",
            levels: {
              0: "No inspection; vendor software trusted by default",
              1: "Basic vulnerability scanning of vendor software",
              2: "Regular security assessments of vendor relationships",
              3: "Complex binary analysis to detect hidden risks and backdoors"
            }
          }
        ]
      },
      cicd: {
        title: "CI/CD & DevSecOps",
        questions: [
          {
            id: "cicd_1",
            text: "How is security integrated into your development pipeline?",
            levels: {
              0: "Security tests only at final deployment stage",
              1: "Some automated security checks in CI/CD",
              2: "Comprehensive DevSecOps with security gates at each stage",
              3: "Zero Trust CI/CD with continuous verification and attestation"
            }
          },
          {
            id: "cicd_2",
            text: "How do you manage secrets and credentials in your pipeline?",
            levels: {
              0: "Secrets hard-coded or stored in repositories",
              1: "Environment variables or basic secret stores",
              2: "Centralized secret management with rotation policies",
              3: "HSM-backed secrets with just-in-time provisioning"
            }
          },
          {
            id: "cicd_3",
            text: "Can you trace software provenance from commit to deployment?",
            levels: {
              0: "No provenance tracking capability",
              1: "Manual logging of major releases",
              2: "Automated logging with some gap in chain of custody",
              3: "Complete cryptographic attestation at every lifecycle stage"
            }
          }
        ]
      }
    };

    const FRAMEWORK_MAPPINGS = {
      nist: "NIST SP 800-218 (Secure Software Development Framework)",
      slsa: "SLSA (Supply-chain Levels for Software Artifacts)",
      safecode: "SAFECode Fundamental Practices"
    };

    const CODELOCKER_CAPABILITIES = {
      governance: [
        "Centralized policy enforcement across all development teams",
        "HSM-based cryptographic key management (FIPS 140-3 Level 3)",
        "Audit trails for compliance and forensic analysis"
      ],
      training: [
        "Automated security checks reduce manual burden on developers",
        "Built-in best practices enforcement through platform design",
        "Real-time feedback on security issues during development"
      ],
      supplyChain: [
        "Signed SBOMs that satisfy CISA 2025 Minimum Elements",
        "Complex binary analysis to detect vendor software tampering",
        "Zero Trust verification of all software artifacts"
      ],
      cicd: [
        "Automated code signing integrated into CI/CD pipelines",
        "Complete software provenance tracking from commit to deployment",
        "Just-in-time secret provisioning with HSM security"
      ]
    };

    const AssessmentTool = () => {
      const [currentTab, setCurrentTab] = useState('assessment');
      const [responses, setResponses] = useState({});
      const [showResults, setShowResults] = useState(false);

      const updateResponse = (questionId, level) => {
        setResponses(prev => ({...prev, [questionId]: level}));
      };

      const calculateMaturityScore = () => {
        const domainScores = {};
        let totalQuestions = 0;
        let totalScore = 0;

        Object.entries(MATURITY_DOMAINS).forEach(([domainKey, domain]) => {
          let domainTotal = 0;
          domain.questions.forEach(q => {
            const response = responses[q.id];
            if (response !== undefined) {
              domainTotal += response;
              totalScore += response;
              totalQuestions++;
            }
          });
          const avgScore = domainTotal / domain.questions.length;
          domainScores[domainKey] = {
            score: avgScore,
            level: Math.round(avgScore),
            title: domain.title
          };
        });

        const overallLevel = totalQuestions > 0 ? Math.round(totalScore / totalQuestions) : 0;
        
        return { domainScores, overallLevel, totalQuestions };
      };

      const results = calculateMaturityScore();
      const allQuestionsAnswered = results.totalQuestions === 
        Object.values(MATURITY_DOMAINS).reduce((acc, d) => acc + d.questions.length, 0);

      const getLevelLabel = (level) => {
        const labels = {
          0: "Ad-hoc",
          1: "Defined",
          2: "Managed",
          3: "Optimized"
        };
        return labels[level] || "Unknown";
      };

      const getLevelDescription = (level) => {
        const descriptions = {
          0: "Your organization has minimal formal processes for supply chain security. Critical gaps exist that expose you to significant risk.",
          1: "Basic security practices are in place, but implementation is inconsistent. You're vulnerable to sophisticated supply chain attacks.",
          2: "You have structured processes and some automation, but gaps remain in continuous verification and third-party software inspection.",
          3: "You've achieved continuous assurance with verified trust chains, Zero Trust architecture, and proactive threat detection."
        };
        return descriptions[level] || "";
      };

      const getGapAnalysis = () => {
        const gaps = [];
        Object.entries(results.domainScores).forEach(([key, data]) => {
          if (data.level < 3) {
            const domain = MATURITY_DOMAINS[key];
            gaps.push({
              domain: data.title,
              currentLevel: data.level,
              targetLevel: 3,
              capabilities: CODELOCKER_CAPABILITIES[key]
            });
          }
        });
        return gaps;
      };

      return (
        <div className="main-container">
          <header className="hero-gradient text-white">
            <div className="max-w-7xl mx-auto px-6 py-6">
              <div className="flex items-center justify-between">
                <a href="https://codelocker.zevainc.com/" className="hover:opacity-80 transition-opacity">
                  <div className="text-2xl font-bold">CodeLocker</div>
                  <div className="text-sm opacity-90">Supply Chain Security Maturity Assessment</div>
                </a>
                <div className="flex gap-4">
                  <a href="index.html" className="px-4 py-2 rounded font-semibold transition-colors bg-purple-800 text-white hover:bg-purple-900 flex items-center gap-2">
                    <span>←</span> Back to Home
                  </a>
                  <button onClick={() => {setCurrentTab('assessment'); setShowResults(false);}} className={`px-4 py-2 rounded font-semibold transition-colors ${currentTab === 'assessment' ? 'bg-white text-purple-600' : 'bg-purple-700 text-white hover:bg-purple-600'}`}>
                    Assessment
                  </button>
                  <button onClick={() => setCurrentTab('frameworks')} className={`px-4 py-2 rounded font-semibold transition-colors ${currentTab === 'frameworks' ? 'bg-white text-purple-600' : 'bg-purple-700 text-white hover:bg-purple-600'}`}>
                    Frameworks
                  </button>
                  <button onClick={() => setCurrentTab('research')} className={`px-4 py-2 rounded font-semibold transition-colors ${currentTab === 'research' ? 'bg-white text-purple-600' : 'bg-purple-700 text-white hover:bg-purple-600'}`}>
                    Research
                  </button>
                </div>
              </div>
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-6 py-12">
            {currentTab === 'assessment' && !showResults && (
              <div className="space-y-8">
                <div className="text-center mb-12">
                  <h1 className="text-4xl font-bold text-gray-900 mb-4">Assess Your Supply Chain Security Maturity</h1>
                  <p className="text-xl text-gray-600 max-w-3xl mx-auto">Answer the questions below to discover where your organization stands and what gaps need to be addressed.</p>
                  <div className="mt-6 text-sm text-gray-500">
                    Progress: {results.totalQuestions} / {Object.values(MATURITY_DOMAINS).reduce((acc, d) => acc + d.questions.length, 0)} questions answered
                  </div>
                </div>

                {Object.entries(MATURITY_DOMAINS).map(([domainKey, domain]) => (
                  <div key={domainKey} className="bg-white border-2 border-gray-200 rounded-lg p-6 card-shadow">
                    <h2 className="text-2xl font-bold text-gray-900 mb-6">{domain.title}</h2>
                    
                    {domain.questions.map((question, idx) => (
                      <div key={question.id} className="mb-8 last:mb-0">
                        <h3 className="text-lg font-semibold text-gray-800 mb-4">{idx + 1}. {question.text}</h3>
                        
                        <div className="space-y-3">
                          {[0, 1, 2, 3].map(level => (
                            <button
                              key={level}
                              onClick={() => updateResponse(question.id, level)}
                              className={`w-full text-left px-4 py-3 rounded-lg border-2 transition-all ${
                                responses[question.id] === level
                                  ? 'border-purple-600 bg-purple-50'
                                  : 'border-gray-200 hover:border-purple-300'
                              }`}
                            >
                              <div className="flex items-center justify-between">
                                <div className="flex items-center gap-3">
                                  <span className={`px-3 py-1 rounded text-sm font-semibold ${
                                    level === 0 ? 'bg-red-100 text-red-700' :
                                    level === 1 ? 'bg-orange-100 text-orange-700' :
                                    level === 2 ? 'bg-yellow-100 text-yellow-700' :
                                    'bg-green-100 text-green-700'
                                  }`}>
                                    Level {level}
                                  </span>
                                  <span className="text-gray-700">{question.levels[level]}</span>
                                </div>
                                {responses[question.id] === level && (
                                  <span className="text-purple-600 font-bold">✓</span>
                                )}
                              </div>
                            </button>
                          ))}
                        </div>
                      </div>
                    ))}
                  </div>
                ))}

                {allQuestionsAnswered && (
                  <div className="text-center">
                    <button onClick={() => setShowResults(true)} className="bg-gradient-to-r from-purple-600 to-blue-600 text-white px-12 py-4 rounded-lg font-semibold text-lg hover:from-purple-700 hover:to-blue-700 transition-all transform hover:scale-105 card-shadow">
                      View Your Results
                    </button>
                  </div>
                )}
              </div>
            )}

            {currentTab === 'assessment' && showResults && (
              <div className="space-y-8">
                <div className="text-center mb-12">
                  <h1 className="text-4xl font-bold text-gray-900 mb-4">Your Maturity Assessment Results</h1>
                  <p className="text-xl text-gray-600">Based on your responses, here's where you stand</p>
                </div>

                <div className={`p-8 rounded-lg card-shadow maturity-level-${results.overallLevel}`}>
                  <div className="text-center">
                    <div className="text-6xl font-bold text-gray-900 mb-2">{getLevelLabel(results.overallLevel)}</div>
                    <div className="text-2xl font-semibold text-gray-700 mb-4">Overall Maturity: Level {results.overallLevel}</div>
                    <p className="text-lg text-gray-700 max-w-2xl mx-auto">{getLevelDescription(results.overallLevel)}</p>
                  </div>
                </div>

                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                  {Object.entries(results.domainScores).map(([key, data]) => (
                    <div key={key} className={`p-6 rounded-lg border-2 card-shadow maturity-level-${data.level}`}>
                      <h3 className="text-xl font-bold text-gray-900 mb-2">{data.title}</h3>
                      <div className="text-3xl font-bold text-gray-800">Level {data.level}: {getLevelLabel(data.level)}</div>
                      <div className="mt-4 h-4 bg-gray-200 rounded-full overflow-hidden">
                        <div className="h-full bg-gray-800" style={{width: `${(data.score / 3) * 100}%`}}></div>
                      </div>
                    </div>
                  ))}
                </div>

                <div className="bg-white border-2 border-gray-200 rounded-lg p-8 card-shadow">
                  <h2 className="text-2xl font-bold text-gray-900 mb-6">Gap Analysis: How CodeLocker Helps</h2>
                  
                  {getGapAnalysis().length === 0 ? (
                    <div className="text-center py-8 text-green-700 text-lg font-semibold">
                      Congratulations! You've achieved optimal maturity across all domains.
                    </div>
                  ) : (
                    <div className="space-y-6">
                      {getGapAnalysis().map((gap, idx) => (
                        <div key={idx} className="border-l-4 border-purple-600 pl-6">
                          <h3 className="text-xl font-bold text-gray-900 mb-2">{gap.domain}</h3>
                          <div className="text-sm text-gray-600 mb-3">
                            Current: Level {gap.currentLevel} → Target: Level {gap.targetLevel}
                          </div>
                          <div className="bg-purple-50 border border-purple-200 rounded p-4">
                            <div className="font-semibold text-purple-900 mb-2">CodeLocker capabilities that close this gap:</div>
                            <ul className="space-y-1">
                              {gap.capabilities.map((cap, i) => (
                                <li key={i} className="text-sm text-gray-700">• {cap}</li>
                              ))}
                            </ul>
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>

                <div className="text-center space-y-4">
                  <a href="https://codelocker.zevainc.com/" className="inline-block bg-gradient-to-r from-purple-600 to-blue-600 text-white px-12 py-4 rounded-lg font-semibold text-lg hover:from-purple-700 hover:to-blue-700 transition-all transform hover:scale-105 card-shadow">
                    Learn More About CodeLocker
                  </a>
                  <div>
                    <button onClick={() => {setShowResults(false); window.scrollTo(0, 0);}} className="text-purple-600 hover:text-purple-700 font-semibold">
                      ← Retake Assessment
                    </button>
                  </div>
                </div>
              </div>
            )}

            {currentTab === 'frameworks' && (
              <div className="space-y-8">
                <div className="text-center mb-12">
                  <h1 className="text-4xl font-bold text-gray-900 mb-4">Industry Frameworks & Standards</h1>
                  <p className="text-xl text-gray-600">Comprehensive guide to supply chain security frameworks</p>
                </div>

                <div className="bg-white border-2 border-gray-200 rounded-lg p-8 card-shadow">
                  <h2 className="text-2xl font-bold text-gray-900 mb-6">NIST SP 800-218: Secure Software Development Framework (SSDF)</h2>
                  <p className="text-gray-700 mb-4">
                    NIST provides foundational recommendations for mitigating software vulnerabilities throughout the Secure Development Lifecycle (SDL). The framework emphasizes integrating security into every phase of software development.
                  </p>
                  <div className="bg-blue-50 border border-blue-200 rounded p-4">
                    <h3 className="font-bold text-blue-900 mb-2">Key Practices:</h3>
                    <ul className="space-y-1 text-sm text-gray-700">
                      <li>• Prepare the Organization (PO) - Establish secure development infrastructure</li>
                      <li>• Protect the Software (PS) - Safeguard all components from tampering</li>
                      <li>• Produce Well-Secured Software (PW) - Build security into the software itself</li>
                      <li>• Respond to Vulnerabilities (RV) - Quickly address discovered flaws</li>
                    </ul>
                  </div>
                </div>

                <div className="bg-white border-2 border-gray-200 rounded-lg p-8 card-shadow">
                  <h2 className="text-2xl font-bold text-gray-900 mb-6">SLSA: Supply-chain Levels for Software Artifacts</h2>
                  <p className="text-gray-700 mb-4">
                    SLSA establishes progressive levels to ensure artifact integrity and provenance, preventing unauthorized tampering during build and distribution phases.
                  </p>
                  <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                    {[
                      {level: 0, title: "No guarantees", desc: "Build process not documented"},
                      {level: 1, title: "Build process exists", desc: "Provenance showing how artifact was built"},
                      {level: 2, title: "Tamper resistance", desc: "Signed provenance, version control"},
                      {level: 3, title: "Extra resistance", desc: "Hardened builds, non-falsifiable provenance"}
                    ].map(item => (
                      <div key={item.level} className="bg-gradient-to-br from-green-50 to-white border-2 border-green-200 rounded p-4">
                        <div className="text-xl font-bold text-green-700 mb-1">Level {item.level}</div>
                        <div className="font-semibold text-gray-900 mb-2">{item.title}</div>
                        <div className="text-sm text-gray-600">{item.desc}</div>
                      </div>
                    ))}
                  </div>
                </div>

                <div className="bg-white border-2 border-gray-200 rounded-lg p-8 card-shadow">
                  <h2 className="text-2xl font-bold text-gray-900 mb-6">SAFECode Fundamental Practices</h2>
                  <p className="text-gray-700 mb-4">
                    SAFECode integrates proven principles from member companies to build security culture. These aren't theoretical—they're battle-tested practices from organizations that ship software at scale.
                  </p>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                    {[
                      {principle: "Least Privilege", desc: "Users and programs operate with minimum necessary permissions"},
                      {principle: "Defense in Depth", desc: "Layered defenses resist attack even if single feature fails"},
                      {principle: "Economy of Mechanism", desc: "Keep designs simple to reduce attack surface"},
                      {principle: "Complete Mediation", desc: "Verify every access; no implicit trust"},
                      {principle: "Fail-Safe Defaults", desc: "Default to secure state; require explicit enabling"},
                      {principle: "Psychological Acceptability", desc: "Easy to use correctly by default"}
                    ].map((item, idx) => (
                      <div key={idx} className="bg-purple-50 border border-purple-200 rounded p-4">
                        <div className="font-bold text-purple-900 mb-1">{item.principle}</div>
                        <div className="text-sm text-gray-700">{item.desc}</div>
                      </div>
                    ))}
                  </div>
                </div>

                <div className="bg-white border-2 border-gray-200 rounded-lg p-8 card-shadow">
                  <h2 className="text-2xl font-bold text-gray-900 mb-6">CISA KEV Catalog</h2>
                  <p className="text-gray-700 mb-4">
                    The Known Exploited Vulnerabilities (KEV) catalog is the authoritative source of vulnerabilities actively exploited in the wild. Organizations should prioritize patching these above all others.
                  </p>
                  <div className="bg-red-50 border border-red-200 rounded p-4">
                    <h3 className="font-bold text-red-900 mb-2">Top Attack Patterns in KEV:</h3>
                    <ul className="space-y-1 text-sm text-gray-700">
                      <li>• <strong>Remote Code Execution (RCE):</strong> Attackers execute arbitrary commands (highest severity)</li>
                      <li>• <strong>Privilege Escalation:</strong> Gaining admin/system credentials after initial access</li>
                      <li>• <strong>Authentication Bypass:</strong> Circumventing login mechanisms</li>
                      <li>• <strong>SQL Injection:</strong> Manipulating database queries to extract data</li>
                    </ul>
                  </div>
                </div>

                <div className="text-center">
                  <a href="https://codelocker.zevainc.com/" className="inline-block bg-gradient-to-r from-purple-600 to-blue-600 text-white px-8 py-3 rounded-lg font-semibold hover:from-purple-700 hover:to-blue-700 transition-all card-shadow">
                    See How CodeLocker Implements These Frameworks
                  </a>
                </div>
              </div>
            )}

            {currentTab === 'research' && (
              <div className="space-y-8">
                <div className="text-center mb-12">
                  <h1 className="text-4xl font-bold text-gray-900 mb-4">Supply Chain Security Research</h1>
                  <p className="text-xl text-gray-600">Data-driven insights from 2025 industry reports</p>
                </div>

                <div className="bg-gradient-to-br from-red-50 to-white border-2 border-red-200 rounded-lg p-8 card-shadow">
                  <h2 className="text-2xl font-bold text-red-900 mb-4">The $4.91M Question</h2>
                  <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
                    <div className="text-center">
                      <div className="text-4xl font-bold text-red-700">$4.91M</div>
                      <div className="text-sm text-gray-600 mt-2">Average supply chain breach cost (global)</div>
                    </div>
                    <div className="text-center">
                      <div className="text-4xl font-bold text-red-700">$10.22M</div>
                      <div className="text-sm text-gray-600 mt-2">US average supply chain breach</div>
                    </div>
                    <div className="text-center">
                      <div className="text-4xl font-bold text-red-700">+227K</div>
                      <div className="text-sm text-gray-600 mt-2">Cost amplification from supply chain vector</div>
                    </div>
                  </div>
                  <p className="text-gray-700 text-sm">Source: IBM Cost of a Data Breach Report 2025</p>
                </div>

                <div className="bg-white border-2 border-gray-200 rounded-lg p-8 card-shadow">
                  <h2 className="text-2xl font-bold text-gray-900 mb-6">Cost Mitigation Factors</h2>
                  <div className="space-y-3">
                    {[
                      {factor: "DevSecOps approach", savings: "$227,192", color: "purple"},
                      {factor: "AI-driven security insights", savings: "$223,503", color: "blue"},
                      {factor: "Security analytics (SIEM)", savings: "$212,044", color: "green"},
                      {factor: "Encryption", savings: "$208,087", color: "teal"},
