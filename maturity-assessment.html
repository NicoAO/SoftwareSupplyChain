    .cta-box { background: linear-gradient(135deg, #1e1b4b, #312e81); border: 1px solid #3730a3; border-radius: 8px; padding: 36px; text-align: center; margin-top: 40px; }

const LVL_COLORS = ["#ef4444","#f97316","#eab308","#22c55e"];

const DOMAINS = [
  {
    id:1, name:"Governance, Compliance & Executive Ownership", weight:0.10,
    desc:"Organizational leadership, policy, budget, and regulatory readiness for supply chain security.",
    riskCost:599000,
    riskNote:"Gaps here add an estimated $599K in annual exposure: CISO designation saves $114K, board oversight saves $111K, noncompliance penalties add $174K, shadow AI incidents add $200K (IBM 2025).",
    attack:"The SolarWinds breach ran for 9 months before a third party discovered it. Most victim organizations had no formal supply chain risk ownership and no standing process for responding. Governance gaps do not cause breaches directly. They determine how long a breach goes unaddressed and how chaotic the response turns out to be.",
    steps:[
      "Designate a formal owner with defined authority for supply chain security. CISO or VP Engineering, not a shared responsibility that belongs to no one.",
      "Write a supply chain security policy and schedule an annual review tied to regulatory updates (EO 14028, CISA attestation requirements).",
      "Add supply chain threats to the enterprise risk register with at least quarterly reporting to leadership.",
      "Create an AI governance policy: which tools developers can use, approval processes for AI-generated code, and how to detect shadow AI."
    ],
    fws:["NIST SSDF PO.1.1","NIST SP 800-161r1","NIST CSF GV.RM","SAFECode"],
    cl:null,
    qs:[
      { id:"1.1", text:"Does your organization have a formally designated owner (CISO, VP Engineering, or equivalent) responsible for software supply chain security?",
        opts:["No designated owner. Supply chain security responsibility is undefined.","An individual has been informally assigned but lacks formal authority or mandate.","A formally designated owner exists with defined authority and reporting structure.","Executive level ownership with a review board, quarterly reporting to the board, and supply chain risk integrated into enterprise risk management."],
        fws:["NIST SSDF PO.1.1","NIST SP 800-161r1 Level 1"] },
      { id:"1.2", text:"Is there a documented software supply chain security policy that is reviewed and updated at least annually?",
        opts:["No documented policy exists.","A policy exists but has not been reviewed or updated in over 12 months.","A policy exists and is reviewed and updated annually.","Policy is reviewed quarterly, aligned with regulatory changes (EO 14028, CISA attestation requirements), and enforced with measurable compliance checks."],
        fws:["NIST SSDF PO.1.2","NIST SP 800-161r1 Level 2","SAFECode"] },
      { id:"1.3", text:"Does the organization maintain a formal risk register that includes software supply chain threats, with regular reporting to leadership?",
        opts:["No risk register or formal tracking of supply chain threats.","Risks are tracked informally or in ad hoc documents.","A formal risk register exists and is reported to leadership at least quarterly.","Risk register is integrated into enterprise risk management with automated risk scoring and board level visibility."],
        fws:["NIST SP 800-161r1 Level 2","NIST CSF GV.RM"] },
      { id:"1.4", text:"Is there a dedicated budget allocation for software supply chain security tools and processes?",
        opts:["No dedicated budget. Security spending is reactive or absorbed into general IT.","Some budget exists but is not formally allocated to supply chain security.","A dedicated budget line item exists for supply chain security tools and processes.","Budget is tied to a multi-year roadmap with measurable investment targets and ROI tracking."],
        fws:["NIST SP 800-161r1 Level 1","NIST SSDF PO.1.1"] },
      { id:"1.5", text:"Does the organization have governance policies for the use of AI tools in software development, including approval processes for AI-generated code and monitoring for shadow AI?",
        opts:["No AI governance policies. Developers use AI tools without oversight.","Informal guidelines exist but are not enforced or monitored.","Formal AI usage policies with an approval process for AI tools in development workflows.","AI governance program with approval processes, regular audits for unsanctioned AI, adversarial testing of AI models, and monitoring for shadow AI across development environments."],
        fws:["NIST CSF GV","IBM AI Governance findings"] }
    ]
  },
  {
    id:2, name:"Software Composition & Dependency Management", weight:0.15,
    desc:"How the organization tracks, evaluates, and secures the third-party and open-source components in its software.",
    riskCost:227000,
    riskNote:"Supply chain breaches tied to unmanaged dependencies add $227K to the average breach cost (IBM 2025). Without SBOMs, organizations also face significant discovery and response time after vulnerability disclosures.",
    attack:"When CVE-2021-44228 (Log4Shell) was disclosed, organizations without SBOMs had no way to identify which systems were affected. Some took weeks. Attackers were actively exploiting the vulnerability within hours of public disclosure. The gap was not technical. It was the absence of an inventory.",
    steps:[
      "Start generating SBOMs for production software, even if only for major releases. Work toward CISA Minimum Elements compliance.",
      "Automate SBOM generation in CI/CD so it happens on every build, not manually after the fact.",
      "Add dependency scanning to your pipeline that blocks builds on critical CVEs. Integrate CISA KEV catalog alerts.",
      "Write an OSS approval policy with defined acceptable licenses and a process for bringing in new dependencies.",
      "Track transitive dependencies. Direct dependencies are only part of the exposure surface."
    ],
    fws:["NIST SSDF PW.4","EO 14028","CISA SBOM Minimum Elements","OWASP CICD-SEC-3","SLSA Source Track"],
    cl:[
      { cap:"Signed SBOMs (CISA 2025 Minimum Elements)", desc:"Addresses gaps in SBOM generation (Q2.1) and automated SBOM processes (Q2.2). CodeLocker generates cryptographically signed SBOMs that satisfy CISA attestation requirements." }
    ],
    qs:[
      { id:"2.1", text:"Does your organization generate Software Bills of Materials (SBOMs) for all production software?",
        opts:["No SBOMs are generated.","SBOMs are generated for some projects, typically on request.","SBOMs are generated for all production software on a regular schedule.","SBOMs are generated for all software, signed cryptographically, and satisfy the CISA 2025 Minimum Elements for SBOMs."],
        fws:["NIST SSDF PW.4.1","EO 14028","CISA SBOM Minimum Elements"] },
      { id:"2.2", text:"Are SBOMs generated automatically as part of the build process, not manually or ad hoc?",
        opts:["SBOMs are not generated or are created manually.","Some SBOM generation is scripted but not integrated into CI/CD.","SBOM generation is automated within the CI/CD pipeline for all builds.","Automated SBOM generation with version tracking, diff analysis between builds, and automated alerts on component changes."],
        fws:["SLSA Source Track","NIST SSDF PW.4.4"] },
      { id:"2.3", text:"Do you scan dependencies for known vulnerabilities (CVEs) before they enter the build pipeline?",
        opts:["No dependency vulnerability scanning.","Periodic manual scans or scanning only on major releases.","Automated scanning in CI/CD that flags vulnerabilities. Critical vulnerabilities block the build.","Continuous scanning with automated blocking based on severity thresholds, integration with CISA KEV catalog, and mean time to remediate tracked as a KPI."],
        fws:["NIST SSDF PW.4.2","CISA KEV","OWASP CICD-SEC-3"] },
      { id:"2.4", text:"Do you have policies governing the approval and use of open-source components, including license compliance?",
        opts:["No policies. Developers pull in any dependency they choose.","Informal guidelines or recommendations but no enforcement.","A formal OSS approval process with a maintained list of approved/restricted components and license compliance checks.","Automated policy enforcement in CI/CD that blocks unapproved components, flags license conflicts, and tracks provenance of all open-source dependencies."],
        fws:["NIST SSDF PW.4.1","SAFECode Economy of Mechanism"] },
      { id:"2.5", text:"Can you trace transitive dependencies (dependencies of dependencies) in your software?",
        opts:["No visibility into transitive dependencies.","Some awareness of direct dependencies but no systematic transitive tracking.","Tooling in place that maps the full dependency tree including transitive dependencies for all projects.","Full dependency graph with automated alerting on transitive vulnerability exposure, reachability analysis, and remediation prioritization."],
        fws:["NIST SSDF PW.4.4","SLSA Source Track"] },
      { id:"2.6", text:"Do you track the provenance of AI models, training data, and ML pipeline components used in your software with the same rigor as traditional code dependencies?",
        opts:["AI models and data are used without provenance tracking.","Some awareness of which AI models are in use, but no formal tracking.","An inventory of AI models and datasets exists with basic version tracking.","AI model provenance is tracked with integrity verification, versioning, and the same approval and scanning processes applied to traditional code dependencies."],
        fws:["NIST SSDF PW.4","OWASP CICD-SEC-3"] }
    ]
  },
  {
    id:3, name:"Build Pipeline Integrity", weight:0.15,
    desc:"The security and integrity of the CI/CD pipeline that compiles, tests, and deploys software.",
    riskCost:227000,
    riskNote:"Organizations with DevSecOps practices save $227K per breach on average (IBM 2025). Build pipeline gaps also expose organizations to the class of attacks that hit SolarWinds, 3CX, and XZ Utils.",
    attack:"The SolarWinds attackers did not breach customer networks directly. They modified the build pipeline. The malware they inserted was signed with SolarWinds' legitimate certificate and shipped as a routine update. Every customer that applied the update was compromised. None of them had any reason to suspect it. A secured, isolated, monitored build pipeline would have flagged the unauthorized modification before the artifact was signed and shipped.",
    steps:[
      "Move to build-as-code with version-controlled pipeline definitions subject to the same review process as application code.",
      "Isolate build environments from developer workstations and general networks. Ephemeral build workers are better than persistent shared servers.",
      "Add security gates (SAST, SCA, container scanning) that block builds on critical findings.",
      "Retain build logs in append-only storage. You will need them for forensics.",
      "Scope pipeline permissions tightly. Each build job should only access the secrets and systems it specifically requires."
    ],
    fws:["SLSA Build Level 1-3","OWASP CICD-SEC-1","OWASP CICD-SEC-5","OWASP CICD-SEC-7","NIST SSDF PW.7"],
    cl:[
      { cap:"CI/CD Pipeline Integration", desc:"Addresses gaps in security gates (Q3.3) and pipeline access controls (Q3.5). CodeLocker integrates directly into CI/CD workflows without requiring changes to the pipeline structure." },
      { cap:"Long-Term Validation (LTV)", desc:"Addresses build log retention and tamper-evidence requirements (Q3.4). LTV ensures build records and signatures remain verifiable over time." }
    ],
    qs:[
      { id:"3.1", text:"Are your build environments isolated from developer workstations and general-purpose networks?",
        opts:["Builds run on developer machines or shared, multi-purpose servers.","A dedicated build server exists but is not network-isolated.","Build environments are isolated with restricted network access and dedicated infrastructure.","Hermetic build environments with no external network access during builds, ephemeral build workers destroyed after each build, and hardware level isolation."],
        fws:["SLSA Build Level 2","OWASP CICD-SEC-7"] },
      { id:"3.2", text:"Are builds executed through a defined, version-controlled pipeline (build-as-code) rather than ad hoc scripts?",
        opts:["Builds are manual or use unversioned scripts.","Some build automation exists but pipeline definitions are not version controlled.","All builds run through version-controlled pipeline definitions with change history.","Pipeline definitions are subject to the same review and approval process as application code, with branch protection and required approvals for pipeline changes."],
        fws:["SLSA Build Level 1","OWASP CICD-SEC-1"] },
      { id:"3.3", text:"Does your CI/CD pipeline include automated security gates (SAST, DAST, SCA) that block builds on policy failure?",
        opts:["No security scanning in the pipeline.","Security scanning exists but results are advisory only and do not block builds.","Automated security gates that block builds when critical or high-severity issues are found.","Multi-layered security gates (SAST, DAST, SCA, container scanning) with severity-based policies, exception workflows for approved risk acceptance, and trend reporting."],
        fws:["NIST SSDF PW.7","SLSA Build Level 2"] },
      { id:"3.4", text:"Are build logs retained and tamper-protected for forensic analysis?",
        opts:["Build logs are not retained or are ephemeral.","Logs are retained but stored in editable or deletable locations.","Logs are retained in append-only or write-once storage with defined retention periods.","Tamper-evident build logs with cryptographic integrity verification, long-term retention (1+ year), and integration with SIEM for anomaly detection."],
        fws:["SLSA Build Level 3","NIST SSDF PO.3","OWASP CICD-SEC-10"] },
      { id:"3.5", text:"Are pipeline execution permissions scoped so that build jobs can only access the specific secrets, systems, and artifacts they require?",
        opts:["Build jobs run with broad access to secrets and systems.","Some access scoping exists but most jobs have access to more than they need.","Secrets and system access are scoped per-job based on what each pipeline step requires.","Fine-grained, just-in-time credential injection with automatic rotation. Jobs cannot access secrets outside their defined scope. Access patterns are logged and auditable."],
        fws:["OWASP CICD-SEC-5","SAFECode Least Privilege"] }
    ]
  },
  {
    id:4, name:"Code Signing & Artifact Provenance", weight:0.15,
    desc:"How software artifacts are signed, verified, and traced back to their source and build process.",
    riskCost:225000,
    riskNote:"Code signing reduces the cost and likelihood of supply chain compromise by $150K-$300K per incident (IBM 2025, midpoint $225K). A valid signature without provenance is not sufficient to verify artifact integrity.",
    attack:"In the 3CX attack, malware was embedded in a signed application installer. The signature was technically valid. What was missing was provenance: verification that the artifact was produced by the expected pipeline, from the expected source, at the expected commit. Signature without provenance provides a false sense of security. Attackers who control the build process can produce validly signed malicious artifacts.",
    steps:[
      "Sign all release artifacts as part of the CI/CD process. Make unsigned artifacts un-deployable.",
      "Store signing keys in an HSM or cloud KMS. Keys on developer machines are a single point of failure.",
      "Automate signing so it is never a manual step that gets skipped under pressure.",
      "Add provenance metadata linking each artifact to its source commit, build pipeline ID, and builder identity. Work toward full SLSA provenance."
    ],
    fws:["NIST SSDF PS.2","SLSA Provenance","OWASP CICD-SEC-9"],
    cl:[
      { cap:"Commit-Level and Binary-Level Code Signing", desc:"Addresses gaps in artifact signing (Q4.1), signing automation (Q4.3), and provenance metadata (Q4.4). Signs at both commit and binary level for a complete chain of custody." },
      { cap:"HSM-Based Key Management", desc:"Addresses gaps in key storage (Q4.2). Signing keys are stored in FIPS 140-3 certified HSMs with centralized management and full audit trails on key usage." }
    ],
    qs:[
      { id:"4.1", text:"Does your organization digitally sign all software artifacts (binaries, containers, packages) before release?",
        opts:["No code signing.","Some artifacts are signed, but inconsistently (e.g., only external releases).","All release artifacts are signed as a standard part of the release process.","All artifacts (internal and external) are signed, with automated verification at every deployment boundary. Unsigned artifacts are blocked from deployment."],
        fws:["NIST SSDF PS.2.1","SLSA Provenance","OWASP CICD-SEC-9"] },
      { id:"4.2", text:"Are signing keys stored in Hardware Security Modules (HSMs) or equivalent tamper-resistant hardware?",
        opts:["Keys are stored in software keystores, config files, or on developer machines.","Keys are stored in cloud key management services but not in dedicated hardware.","Keys are stored in HSMs or equivalent tamper-resistant hardware with access controls.","FIPS 140-3 Level 3 certified HSMs with centralized key management, automated key rotation, and audit trails for all key usage."],
        fws:["NIST SSDF PS.2.1","SAFECode Complete Mediation"] },
      { id:"4.3", text:"Is the code signing process automated within the CI/CD pipeline, not a manual step performed by individual developers?",
        opts:["Signing is manual or not performed.","Signing is partially automated but requires manual intervention for some artifact types.","Signing is fully automated within the CI/CD pipeline for all artifact types.","Signing is automated, integrated with build provenance, and includes verification gates that confirm the signing identity matches the authorized pipeline before release."],
        fws:["SLSA Build Level 2","NIST SSDF PS.2"] },
      { id:"4.4", text:"Do your signed artifacts include provenance metadata (what was built, from which source, by which pipeline)?",
        opts:["No provenance metadata is attached to artifacts.","Basic metadata (version, timestamp) but no build provenance.","Provenance metadata includes source commit, build pipeline ID, and builder identity.","Full SLSA provenance with cryptographic binding to the build process, verifiable by downstream consumers, and retained for long-term validation."],
        fws:["SLSA Provenance","NIST SSDF PS.2.1"] }
    ]
  },
  {
    id:5, name:"Identity, Access & Secret Management", weight:0.12,
    desc:"How the organization controls who and what can access development infrastructure, and how secrets are handled.",
    riskCost:190000,
    riskNote:"IAM improvements save $190K per breach on average (IBM 2025). Most pipeline compromises start with a stolen or overly permissive credential, not a zero-day exploit.",
    attack:"In the CircleCI breach (2023), attackers stole a machine account token with access to customer secrets stored in CI/CD pipelines. The token was not rotated, was not scoped to specific customers, and was not monitored for anomalous usage. Thousands of customer secrets were exposed. The root cause was not sophisticated. It was a credential with too much access and no expiration.",
    steps:[
      "Audit permissions across all development infrastructure. Remove everything that is not actively needed.",
      "Move all secrets to a dedicated vault with access logging and audit trails. Remove secrets from code, configs, and environment variables.",

      { cap:"HSM-Based Key Management", desc:"Addresses gaps in secrets management (Q5.2). Centralized vault with hardware-backed storage, automated rotation, and dynamic secret generation." }
    ],
    qs:[
      { id:"5.1", text:"Do all developers and CI/CD systems operate under least-privilege access controls with role-based permissions?",
        opts:["Shared accounts or overly broad permissions are common.","Individual accounts exist but permissions are not regularly reviewed or scoped.","Role-based access control with permissions scoped to job function. Regular access reviews.","Just-in-time access provisioning with automatic expiration. Access reviews are automated and access patterns are monitored for anomalies."],
        fws:["SAFECode Least Privilege","NIST SSDF PO.2","OWASP CICD-SEC-2","CIS Controls 6"] },
      { id:"5.2", text:"Are secrets (API keys, tokens, credentials) managed through a dedicated secrets vault rather than stored in code, config files, or environment variables?",
        opts:["Secrets are hard-coded in source, stored in config files, or passed as environment variables without a vault.","Some secrets are in a vault but legacy secrets remain in code or config.","All secrets are managed through a dedicated vault with access controls and audit logging.","Centralized secrets management with automated rotation, dynamic secret generation, and automated scanning for leaked secrets in repositories."],
        fws:["NIST SSDF PO.5.2","OWASP CICD-SEC-6","CIS Controls 5"] },
      { id:"5.3", text:"Is multi-factor authentication enforced for all access to source code repositories, build systems, and artifact registries?",
        opts:["No MFA on development infrastructure.","MFA is available but not required for all systems.","MFA is enforced on all development infrastructure (repos, CI/CD, registries).","Hardware-token based MFA (FIDO2/WebAuthn) enforced on all systems, with phishing-resistant authentication and conditional access policies."],
        fws:["NIST SSDF PO.2","SAFECode Complete Mediation","CIS Controls 6.3/6.4"] },
      { id:"5.4", text:"Does the organization inventory and manage non-human identities (service accounts, API keys, bot tokens, AI agent credentials) with the same rigor as human identities?",
        opts:["Non-human identities are untracked. Service accounts and API keys are created ad hoc.","Some awareness of non-human identities but no systematic inventory or lifecycle management.","A formal inventory of non-human identities exists with defined owners and periodic reviews.","Complete NHI lifecycle management with automated credential expiration, usage monitoring, anomaly detection, and the same access governance applied to human identities."],
        fws:["NIST SSDF PO.5.2","OWASP CICD-SEC-2"] }

  {
    id:6, name:"Third-Party & Vendor Risk Management", weight:0.13,

function domainScore(domainId, answers) {
  const d = DOMAINS.find(x => x.id === domainId);
  const vals = d.qs.map(q => answers[q.id]).filter(v => v !== undefined);
  if (vals.length === 0) return 0;
  return vals.reduce((a,b) => a+b, 0) / d.qs.length;
}

function calcOverall(answers) {
  let ws = 0;
  for (const d of DOMAINS) ws += domainScore(d.id, answers) * d.weight;
  return Math.round((ws / 3) * 100);
}

function calcRisk(answers) {
  let total = 0;
  for (const d of DOMAINS) { if (domainScore(d.id, answers) < 2.0) total += d.riskCost; }
  return total;
}

function fmtMoney(n) {
  if (n >= 1000000) return '$' + (n/1000000).toFixed(2) + 'M';
  if (n >= 1000) return '$' + Math.round(n/1000) + 'K';
  return '$' + n;
}

function ScoreGauge({ score }) {
  const r=52, cx=70, cy=70, circ=2*Math.PI*r;
  const fill=(score/100)*circ;
  const color = score>=75?'#22c55e':score>=50?'#eab308':score>=25?'#f97316':'#ef4444';
  const lbl = score>=75?'Optimized':score>=50?'Managed':score>=25?'Defined':'Ad Hoc';
  return (
    <div style={{textAlign:'center'}}>
      <svg width="140" height="140" viewBox="0 0 140 140">
        <circle cx={cx} cy={cy} r={r} fill="none" stroke="#e5e7eb" strokeWidth="12"/>
        <circle cx={cx} cy={cy} r={r} fill="none" stroke={color} strokeWidth="12"
          strokeDasharray={fill+" "+(circ-fill)} strokeLinecap="round"
          transform={"rotate(-90 "+cx+" "+cy+")"}/>
        <text x={cx} y={cy-6} textAnchor="middle" fill="#1f2937" fontSize="30" fontWeight="700" fontFamily="IBM Plex Sans,sans-serif">{score}</text>
        <text x={cx} y={cy+16} textAnchor="middle" fill="#6b7280" fontSize="12" fontFamily="IBM Plex Sans,sans-serif">out of 100</text>
      </svg>
      <div style={{fontSize:14,fontWeight:600,color,marginTop:2}}>{lbl}</div>
    </div>
  );
}

      {top5.length > 0 && (
        <div className="card" style={{marginBottom:20}}>
          <h3 style={{fontSize:15,fontWeight:600,color:'#111827',marginBottom:4}}>Priority Roadmap</h3>
          <p style={{fontSize:12,color:'#6b7280',marginBottom:18}}>Top actions for domains below Level 2, ranked by estimated cost impact.</p>
          {top5.map(({d},i) => (
            <div key={d.id} className="priority-item">
              <div className={'priority-rank'+(i<3?' top':'')}>{i+1}</div>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:600,color:'#111827',marginBottom:3}}>{d.name}</div>
                <div style={{fontSize:12,color:'#4b5563',lineHeight:1.5}}>{d.steps[0]}</div>
              </div>
              <div style={{fontSize:13,fontWeight:600,color:'#dc2626',flexShrink:0,marginLeft:12}}>{fmtMoney(d.riskCost)}</div>
            </div>
          ))}
        </div>
      )}

      <h3 style={{fontSize:17,fontWeight:600,color:'#111827',marginBottom:14,marginTop:32}}>Domain-by-Domain Breakdown</h3>
      {domainScores.map(({d,s}) => {
        const lvl = Math.min(3, Math.floor(s < 3 ? s : 3));
        const isGap = s < 2.0;
        const isOpen = openDomain === d.id;
        return (
          <div key={d.id} className="acc-item">
            <div className="acc-head" onClick={() => setOpenDomain(isOpen ? null : d.id)}>
              <div style={{flex:1}}>
                <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
                  <span style={{fontSize:14,fontWeight:600,color:'#111827'}}>{d.id}. {d.name}</span>
                  <span className={'tag '+LVL_TAG_CLS[lvl]}>Level {lvl} ({LVL_LABELS[lvl]})</span>
                  {isGap && <span className="tag" style={{background:'rgba(239,68,68,0.1)',color:'#ef4444',border:'1px solid rgba(239,68,68,0.2)'}}>Gap</span>}
                </div>
                <div style={{marginTop:6,maxWidth:300}}>
                  <div style={{position:'relative',height:5,background:'#e5e7eb',borderRadius:3}}>
                    <div style={{height:'100%',background:LVL_COLORS[lvl],borderRadius:3,width:((s/3)*100)+'%'}}/>
                    <div style={{position:'absolute',top:-2,bottom:-2,width:2,background:'#9ca3af',left:'66.67%'}}/>
                  </div>
                </div>
              </div>
              <div style={{fontSize:18,color:'#6b7280',marginLeft:12,flexShrink:0}}>{isOpen?'−':'+'}</div>
            </div>

            {isOpen && (
              <div className="acc-body">
                <div style={{marginBottom:16}}>
                  <div style={{fontSize:11,fontWeight:600,color:'#6b7280',marginBottom:8,letterSpacing:'0.07em',textTransform:'uppercase'}}>Question scores</div>
                  {d.qs.map(q => {
                    const qa = answers[q.id];
                    return (
                      <div key={q.id} style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',padding:'8px 0',borderBottom:'1px solid #e5e7eb',gap:12}}>
                        <div style={{fontSize:12,color:'#374151',flex:1,lineHeight:1.55}}>{q.text}</div>
                        {qa !== undefined
                          ? <span className={'tag '+LVL_TAG_CLS[qa]} style={{flexShrink:0}}>Level {qa}</span>
                          : <span style={{fontSize:11,color:'#9ca3af',flexShrink:0}}>No answer</span>}
                      </div>
                    );
                  })}
                </div>

                {isGap && (
                  <div style={{marginBottom:16,padding:'12px 14px',background:'rgba(239,68,68,0.05)',border:'1px solid rgba(239,68,68,0.12)',borderRadius:6}}>
                    <div style={{fontSize:11,fontWeight:600,color:'#ef4444',marginBottom:5,letterSpacing:'0.07em',textTransform:'uppercase'}}>Risk exposure</div>
                    <div style={{fontSize:12,color:'#6b7280',lineHeight:1.6}}>{d.riskNote}</div>
                  </div>
                )}

                <div style={{marginBottom:16}}>
                  <div style={{fontSize:11,fontWeight:600,color:'#6b7280',marginBottom:8,letterSpacing:'0.07em',textTransform:'uppercase'}}>Real-world attack scenario</div>
                  <p style={{fontSize:13,color:'#374151',lineHeight:1.7}}>{d.attack}</p>
                </div>

                {isGap && (
                  <div style={{marginBottom:16}}>
                    <div style={{fontSize:11,fontWeight:600,color:'#6b7280',marginBottom:8,letterSpacing:'0.07em',textTransform:'uppercase'}}>Recommended next steps</div>
                    <ul style={{paddingLeft:0,listStyle:'none'}}>
                      {d.steps.map((step,i) => (
                        <li key={i} style={{display:'flex',gap:10,marginBottom:8,alignItems:'flex-start'}}>
                          <span style={{width:18,height:18,borderRadius:'50%',background:'#eff6ff',border:'1px solid #bfdbfe',display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,color:'#2563eb',flexShrink:0,marginTop:1}}>{i+1}</span>
                          <span style={{fontSize:13,color:'#374151',lineHeight:1.6}}>{step}</span>
                        </li>
                      ))}
                    </ul>
                  </div>
                )}

                <div style={{marginBottom: isGap && d.cl ? 16 : 0}}>
                  <div style={{fontSize:11,fontWeight:600,color:'#6b7280',marginBottom:8,letterSpacing:'0.07em',textTransform:'uppercase'}}>Framework references</div>
                  <div style={{display:'flex',flexWrap:'wrap'}}>
                    {d.fws.map(f => <span key={f} className="tag tag-fw">{f}</span>)}
                  </div>
                </div>

                {isGap && d.cl && (
                  <div>
                    <div className="divider"/>
                    <div style={{fontSize:11,fontWeight:600,color:'#3b82f6',marginBottom:10,letterSpacing:'0.07em',textTransform:'uppercase'}}>How CodeLocker addresses these gaps</div>
                    {d.cl.map((c,i) => (
                      <div key={i} className="cl-cap">
                        <div className="cl-cap-title">{c.cap}</div>
                        <div className="cl-cap-desc">{c.desc}</div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}
          </div>
        );
      })}

      <div className="cta-box">
        <h3 style={{fontSize:20,fontWeight:600,color:'#fff',marginBottom:10}}>See how CodeLocker closes these gaps</h3>
        <p style={{color:'#64748b',marginBottom:24,maxWidth:460,margin:'0 auto 24px',fontSize:14,lineHeight:1.65}}>
          CodeLocker addresses the most technically complex parts of the SCRM maturity gap: code signing, SBOM generation, artifact provenance, binary analysis, and Zero Trust pipeline security.
        </p>
        <a href="https://codelocker.zevainc.com/" className="btn-cta" target="_blank" rel="noopener noreferrer">Visit CodeLocker at Zeva Inc.</a>
      </div>

      <div style={{textAlign:'center',marginTop:28,paddingTop:20,borderTop:'1px solid #e5e7eb'}}>
        <p style={{fontSize:11,color:'#9ca3af'}}>Cost figures from IBM Cost of a Data Breach Report 2025. Frameworks: NIST SSDF, NIST SP 800-161r1, SLSA, OWASP CICD Top 10, SAFECode, CIS Controls.</p>
        <p style={{fontSize:11,color:'#9ca3af',marginTop:3}}>© 2026 <a href="https://www.zevainc.com/" style={{color:'#6b7280'}}>Zeva Inc.</a> Columbia MSBA Capstone Project</p>
      </div>
    </div>
  );
}

function App() {
  const [screen, setScreen] = useState('intro');
  const [answers, setAnswers] = useState({});
  const [domainIdx, setDomainIdx] = useState(0);

  function answer(qId, level) { setAnswers(prev => ({...prev, [qId]: level})); }
  function start() { setDomainIdx(0); setScreen('assessment'); }
  function next() { setDomainIdx(i => i+1); window.scrollTo({top:0,behavior:'smooth'}); }
  function back() { setDomainIdx(i => i-1); window.scrollTo({top:0,behavior:'smooth'}); }
  function finish() { setScreen('results'); window.scrollTo({top:0,behavior:'smooth'}); }
  function restart() { setAnswers({}); setDomainIdx(0); setScreen('intro'); window.scrollTo({top:0,behavior:'smooth'}); }

  return (
    <div>
      <div className="header">
        <Logo/>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          {screen==='results' && <button className="btn btn-ghost" style={{fontSize:13,padding:'7px 14px'}} onClick={restart}>Retake</button>}
          <a href="index.html" className="back-link">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
            Back to Home
          </a>
        </div>
      </div>
      {screen==='intro' && <IntroScreen onStart={start}/>}
      {screen==='assessment' && <AssessmentScreen answers={answers} onAnswer={answer} currentDomainIdx={domainIdx} onNext={next} onBack={back} onFinish={finish}/>}
      {screen==='results' && <ResultsScreen answers={answers}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
