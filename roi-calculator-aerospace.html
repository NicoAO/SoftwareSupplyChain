<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DoD Contract Risk ROI Calculator - CodeLocker</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'IBM Plex Sans', sans-serif; background: #f8fafc; color: #0a1628; line-height: 1.5; }
    a { color: #2c5282; text-decoration: none; }
    a:hover { text-decoration: underline; }
    
    .header {
      background: #0a1628;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid rgba(96,165,250,0.2);
    }
    
    .header-brand {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    
    .header-tag {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.2em;
      color: #60a5fa;
      padding: 4px 10px;
      border: 1px solid rgba(96,165,250,0.4);
      border-radius: 3px;
      text-transform: uppercase;
    }
    
    .back-link {
      color: rgba(255,255,255,0.85);
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .back-link:hover { color: white; text-decoration: none; }
    
    .page-wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }
    
    .page-header {
      text-align: center;
      margin-bottom: 40px;
    }
    
    .page-title {
      font-size: 36px;
      font-weight: 700;
      color: #0a1628;
      margin-bottom: 10px;
      letter-spacing: -0.01em;
    }
    
    .page-sub {
      font-size: 16px;
      color: #64748b;
      max-width: 700px;
      margin: 0 auto;
    }
    
    .layout {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 32px;
    }
    
    .panel {
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 4px;
      padding: 28px;
    }
    
    .panel-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.2em;
      color: #2c5282;
      margin-bottom: 8px;
      text-transform: uppercase;
    }
    
    .panel-heading {
      font-size: 20px;
      font-weight: 700;
      color: #0a1628;
      margin-bottom: 20px;
      letter-spacing: -0.01em;
    }
    
    .input-group {
      margin-bottom: 20px;
    }
    
    .input-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #334155;
      margin-bottom: 6px;
    }
    
    .input-hint {
      font-size: 11px;
      color: #94a3b8;
      margin-bottom: 8px;
    }
    
    .input-field {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #cbd5e1;
      border-radius: 3px;
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 14px;
      background: #f8fafc;
      transition: border-color 0.15s;
    }
    
    .input-field:focus {
      outline: none;
      border-color: #2c5282;
      background: white;
    }
    
    .range-field {
      width: 100%;
      margin-top: 6px;
      accent-color: #2c5282;
    }
    
    .value-display {
      font-size: 15px;
      font-weight: 700;
      color: #0a1628;
    }
    
    .checkbox-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 12px;
      border: 1px solid #e2e8f0;
      border-radius: 3px;
      margin-bottom: 6px;
      cursor: pointer;
      transition: all 0.15s;
    }
    
    .checkbox-row:hover {
      border-color: #2c5282;
      background: #f8fafc;
    }
    
    .checkbox-row.checked {
      border-color: #2c5282;
      background: #eff6ff;
    }
    
    .checkbox-row input {
      margin-top: 3px;
      accent-color: #2c5282;
    }
    
    .checkbox-label {
      font-size: 13px;
      color: #334155;
      flex: 1;
    }
    
    .checkbox-label strong {
      color: #0a1628;
      display: block;
      margin-bottom: 2px;
    }
    
    .results-hero {
      background: #0a1628;
      color: white;
      padding: 36px;
      border-radius: 4px;
      margin-bottom: 24px;
      position: relative;
      overflow: hidden;
    }
    
    .results-hero::before {
      content: '';
      position: absolute;
      top: 0; right: 0;
      width: 300px;
      height: 100%;
      background: linear-gradient(135deg, transparent 0%, rgba(96,165,250,0.1) 100%);
    }
    
    .hero-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.25em;
      color: #60a5fa;
      margin-bottom: 10px;
      text-transform: uppercase;
    }
    
    .hero-value {
      font-size: 56px;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 12px;
      letter-spacing: -0.02em;
    }
    
    .hero-sub {
      font-size: 15px;
      color: rgba(255,255,255,0.75);
      max-width: 600px;
    }
    
    .metric-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }
    
    .metric-card {
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 4px;
      padding: 20px;
    }
    
    .metric-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      color: #64748b;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    
    .metric-value {
      font-size: 28px;
      font-weight: 700;
      color: #0a1628;
      line-height: 1;
      margin-bottom: 4px;
    }
    
    .metric-foot {
      font-size: 12px;
      color: #94a3b8;
    }
    
    .breakdown-section {
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 4px;
      padding: 28px;
      margin-bottom: 24px;
    }
    
    .breakdown-title {
      font-size: 18px;
      font-weight: 700;
      color: #0a1628;
      margin-bottom: 20px;
      padding-bottom: 14px;
      border-bottom: 2px solid #0a1628;
    }
    
    .breakdown-row {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      padding: 14px 0;
      border-bottom: 1px solid #f1f5f9;
      gap: 20px;
    }
    
    .breakdown-row:last-child {
      border-bottom: none;
    }
    
    .breakdown-label {
      font-size: 14px;
      color: #334155;
    }
    
    .breakdown-label strong {
      color: #0a1628;
      display: block;
      margin-bottom: 2px;
    }
    
    .breakdown-label .citation {
      font-size: 11px;
      color: #94a3b8;
      margin-top: 4px;
    }
    
    .breakdown-value {
      font-size: 18px;
      font-weight: 700;
      color: #dc2626;
      text-align: right;
      white-space: nowrap;
    }
    
    .breakdown-value.savings {
      color: #16a34a;
    }
    
    .breakdown-total {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      padding: 20px 0 0;
      margin-top: 10px;
      border-top: 2px solid #0a1628;
      font-size: 16px;
      font-weight: 700;
      color: #0a1628;
    }
    
    .breakdown-total .breakdown-value {
      font-size: 24px;
    }
    
    .bar-vis {
      margin: 16px 0 6px;
      height: 12px;
      background: #f1f5f9;
      border-radius: 2px;
      overflow: hidden;
    }
    
    .bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #dc2626, #ef4444);
      transition: width 0.5s ease;
    }
    
    .bar-fill.green {
      background: linear-gradient(90deg, #16a34a, #22c55e);
    }
    
    .scenario-card {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-left: 4px solid #2c5282;
      padding: 18px 22px;
      margin-bottom: 12px;
      border-radius: 2px;
    }
    
    .scenario-title {
      font-size: 14px;
      font-weight: 700;
      color: #0a1628;
      margin-bottom: 4px;
    }
    
    .scenario-desc {
      font-size: 13px;
      color: #475569;
      line-height: 1.5;
    }
    
    .cta-box {
      background: #0a1628;
      color: white;
      padding: 40px;
      border-radius: 4px;
      text-align: center;
      margin-top: 32px;
      position: relative;
      overflow: hidden;
    }
    
    .cta-title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 10px;
      letter-spacing: -0.01em;
    }
    
    .cta-desc {
      font-size: 15px;
      color: rgba(255,255,255,0.8);
      margin-bottom: 24px;
      max-width: 540px;
      margin-left: auto;
      margin-right: auto;
    }
    
    .cta-button {
      display: inline-block;
      padding: 13px 32px;
      background: white;
      color: #0a1628;
      font-weight: 700;
      font-size: 14px;
      border-radius: 3px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      transition: all 0.2s;
    }
    
    .cta-button:hover {
      background: #60a5fa;
      color: white;
      text-decoration: none;
    }
    
    .warning-badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.15em;
      color: #dc2626;
      padding: 3px 8px;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 2px;
      text-transform: uppercase;
    }
    
    .info-tag {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.15em;
      color: #2c5282;
      padding: 3px 8px;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      border-radius: 2px;
      text-transform: uppercase;
      margin-left: 8px;
    }
    
    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      .metric-grid { grid-template-columns: 1fr; }
      .hero-value { font-size: 40px; }
    }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useMemo } = React;

// CodeLocker pricing (same tiers as commercial)
const CL_PRICING = [
  { min: 1, max: 100, perUser: 975 },
  { min: 101, max: 250, perUser: 895 },
  { min: 251, max: 500, perUser: 845 },
  { min: 501, max: 1000, perUser: 795 },
  { min: 1001, max: Infinity, perUser: 750 }
];
const CL_IMPLEMENTATION = 5000;

// Risk reduction from CodeLocker
const CL_BREACH_REDUCTION = 0.80;

// FCA per-claim penalty (2024 adjusted amount)
const FCA_PER_CLAIM_MIN = 13946;
const FCA_PER_CLAIM_MAX = 27894;
const FCA_TREBLE_MULTIPLIER = 3;

function getCodeLockerCost(developers) {
  const tier = CL_PRICING.find(t => developers >= t.min && developers <= t.max);
  return developers * tier.perUser;
}

function fmt(n) {
  if (n >= 1000000) return '$' + (n/1000000).toFixed(2) + 'M';
  if (n >= 1000) return '$' + Math.round(n/1000).toLocaleString() + 'K';
  return '$' + Math.round(n).toLocaleString();
}

function fmtFull(n) {
  return '$' + Math.round(n).toLocaleString();
}

function fmtPct(n) {
  return (n * 100).toFixed(0) + '%';
}

function InputPanel({ profile, update }) {
  return (
    <div className="panel">
      <div className="panel-title">Configuration</div>
      <div className="panel-heading">Your Contract Profile</div>
      
      <div className="input-group">
        <label className="input-label">Primary DoD Contract Value</label>
        <p className="input-hint">Total value of the contract at risk if software supply chain compromise leads to termination.</p>
        <input
          type="number"
          min="1000000"
          step="1000000"
          className="input-field"
          value={profile.contractValue}
          onChange={(e) => update('contractValue', parseFloat(e.target.value) || 0)}
        />
        <input
          type="range"
          min="1000000"
          max="500000000"
          step="1000000"
          className="range-field"
          value={profile.contractValue}
          onChange={(e) => update('contractValue', parseFloat(e.target.value))}
        />
        <div className="value-display">{fmt(profile.contractValue)}</div>
      </div>

      <div className="input-group">
        <label className="input-label">Annual DoD Revenue Pipeline</label>
        <p className="input-hint">Total expected revenue from current and pipeline federal contracts over the next 3 years.</p>
        <input
          type="number"
          min="1000000"
          step="5000000"
          className="input-field"
          value={profile.pipelineRevenue}
          onChange={(e) => update('pipelineRevenue', parseFloat(e.target.value) || 0)}
        />
        <input
          type="range"
          min="5000000"
          max="2000000000"
          step="5000000"
          className="range-field"
          value={profile.pipelineRevenue}
          onChange={(e) => update('pipelineRevenue', parseFloat(e.target.value))}
        />
        <div className="value-display">{fmt(profile.pipelineRevenue)}</div>
      </div>

      <div className="input-group">
        <label className="input-label">Software Developers</label>
        <p className="input-hint">Used to calculate CodeLocker licensing costs and breach cost scaling.</p>
        <input
          type="number"
          min="1"
          className="input-field"
          value={profile.developers}
          onChange={(e) => update('developers', parseInt(e.target.value) || 1)}
        />
        <input
          type="range"
          min="10"
          max="2000"
          step="10"
          className="range-field"
          value={profile.developers}
          onChange={(e) => update('developers', parseInt(e.target.value))}
        />
        <div className="value-display">{profile.developers.toLocaleString()} developers</div>
      </div>

      <div className="input-group">
        <label className="input-label">Number of False Claims Submitted</label>
        <p className="input-hint">Invoices or claims tied to non-compliant software. Each claim carries a per-occurrence penalty under the False Claims Act.</p>
        <input
          type="number"
          min="0"
          className="input-field"
          value={profile.claimCount}
          onChange={(e) => update('claimCount', parseInt(e.target.value) || 0)}
        />
        <input
          type="range"
          min="0"
          max="500"
          step="1"
          className="range-field"
          value={profile.claimCount}
          onChange={(e) => update('claimCount', parseInt(e.target.value))}
        />
        <div className="value-display">{profile.claimCount} claims</div>
      </div>

      <div className="input-group">
        <label className="input-label">Risk Factors</label>
        <p className="input-hint">Check the risks that apply to your organization.</p>
        
        <div className={`checkbox-row ${profile.fcaRisk ? 'checked' : ''}`} onClick={() => update('fcaRisk', !profile.fcaRisk)}>
          <input type="checkbox" checked={profile.fcaRisk} readOnly />
          <div className="checkbox-label">
            <strong>False Claims Act exposure</strong>
            Treble damages plus per-claim penalties when non-compliant software reaches the government.
          </div>
        </div>
        
        <div className={`checkbox-row ${profile.cmmcRisk ? 'checked' : ''}`} onClick={() => update('cmmcRisk', !profile.cmmcRisk)}>
          <input type="checkbox" checked={profile.cmmcRisk} readOnly />
          <div className="checkbox-label">
            <strong>CMMC non-compliance</strong>
            Suspension from federal procurement. Typical recovery takes 12-24 months.
          </div>
        </div>
        
        <div className={`checkbox-row ${profile.reputationRisk ? 'checked' : ''}`} onClick={() => update('reputationRisk', !profile.reputationRisk)}>
          <input type="checkbox" checked={profile.reputationRisk} readOnly />
          <div className="checkbox-label">
            <strong>Reputational damage</strong>
            Lost pipeline value from future contracts that get awarded to competitors.
          </div>
        </div>
      </div>

      <div className="input-group">
        <label className="input-label">Breach Probability Without CodeLocker</label>
        <p className="input-hint">Industry data puts supply chain breach likelihood at 15-30% annually for defense contractors.</p>
        <input
          type="range"
          min="5"
          max="50"
          step="1"
          className="range-field"
          value={profile.breachProbability}
          onChange={(e) => update('breachProbability', parseInt(e.target.value))}
        />
        <div className="value-display">{profile.breachProbability}% annually</div>
      </div>
    </div>
  );
}

function ResultsPanel({ profile }) {
  const calc = useMemo(() => {
    // Base breach cost: IBM 2025 supply chain breach avg + federal contractor premium
    const baseBreachCost = 4910000;
    const federalPremium = 1.8; // Federal/defense breaches cost more due to complexity
    const sizeMultiplier = profile.developers < 100 ? 0.7 : profile.developers < 500 ? 1.0 : 1.4;
    const directBreachCost = baseBreachCost * federalPremium * sizeMultiplier;
    
    // Contract termination loss (if breach triggers termination)
    const contractTerminationRisk = profile.contractValue * 0.35; // 35% probability weight
    
    // FCA exposure: treble damages + per-claim penalties
    let fcaExposure = 0;
    if (profile.fcaRisk && profile.claimCount > 0) {
      const trebleDamages = profile.contractValue * 0.15 * FCA_TREBLE_MULTIPLIER; // 15% of contract as damages, trebled
      const perClaimPenalties = profile.claimCount * ((FCA_PER_CLAIM_MIN + FCA_PER_CLAIM_MAX) / 2);
      fcaExposure = trebleDamages + perClaimPenalties;
    }
    
    // CMMC suspension: 18 months of lost pipeline revenue (avg)
    let cmmcExposure = 0;
    if (profile.cmmcRisk) {
      const suspensionDuration = 1.5; // years
      const suspensionProbability = 0.20; // 20% probability weight
      cmmcExposure = (profile.pipelineRevenue / 3) * suspensionDuration * suspensionProbability;
    }
    
    // Reputational damage: 25% of 3-year pipeline
    let reputationExposure = 0;
    if (profile.reputationRisk) {
      reputationExposure = profile.pipelineRevenue * 0.25 * 0.60; // 60% probability weight
    }
    
    // Total annual exposure
    const totalExposure = directBreachCost + contractTerminationRisk + fcaExposure + cmmcExposure + reputationExposure;
    const expectedAnnualLoss = totalExposure * (profile.breachProbability / 100);
    
    // CodeLocker costs
    const annualCodeLockerCost = getCodeLockerCost(profile.developers);
    const firstYearCost = annualCodeLockerCost + CL_IMPLEMENTATION;
    
    // Annual savings
    const annualSavings = expectedAnnualLoss * CL_BREACH_REDUCTION;
    const netYearOne = annualSavings - firstYearCost;
    const netYearTwo = annualSavings - annualCodeLockerCost;
    
    // 3-year total
    const threeYearSavings = annualSavings * 3;
    const threeYearCost = firstYearCost + (annualCodeLockerCost * 2);
    const threeYearNet = threeYearSavings - threeYearCost;
    const threeYearROI = ((threeYearSavings - threeYearCost) / threeYearCost) * 100;
    
    return {
      directBreachCost,
      contractTerminationRisk,
      fcaExposure,
      cmmcExposure,
      reputationExposure,
      totalExposure,
      expectedAnnualLoss,
      annualCodeLockerCost,
      firstYearCost,
      annualSavings,
      netYearOne,
      netYearTwo,
      threeYearSavings,
      threeYearCost,
      threeYearNet,
      threeYearROI
    };
  }, [profile]);

  return (
    <div>
      <div className="results-hero">
        <div className="hero-label">3-Year Net Benefit</div>
        <div className="hero-value">{fmt(calc.threeYearNet)}</div>
        <div className="hero-sub">Estimated savings after deducting CodeLocker licensing and implementation costs, assuming your current breach probability and risk factors.</div>
      </div>

      <div className="metric-grid">
        <div className="metric-card">
          <div className="metric-label">Annual Risk Exposure</div>
          <div className="metric-value">{fmt(calc.expectedAnnualLoss)}</div>
          <div className="metric-foot">Probability-weighted expected loss</div>
        </div>
        <div className="metric-card">
          <div className="metric-label">CodeLocker Year 1 Cost</div>
          <div className="metric-value">{fmt(calc.firstYearCost)}</div>
          <div className="metric-foot">Licensing + $5K implementation</div>
        </div>
        <div className="metric-card">
          <div className="metric-label">3-Year ROI</div>
          <div className="metric-value" style={{color: calc.threeYearROI > 0 ? '#16a34a' : '#dc2626'}}>{calc.threeYearROI > 0 ? '+' : ''}{Math.round(calc.threeYearROI)}%</div>
          <div className="metric-foot">Return on CodeLocker investment</div>
        </div>
      </div>

      <div className="breakdown-section">
        <div className="breakdown-title">Risk Exposure Breakdown <span className="warning-badge">Gross Exposure</span></div>
        
        <div className="breakdown-row">
          <div className="breakdown-label">
            <strong>Direct breach cost</strong>
            Incident response, forensics, lost business, notification costs
            <div className="citation">IBM 2025 supply chain avg × federal premium × size adjustment</div>
          </div>
          <div className="breakdown-value">{fmtFull(calc.directBreachCost)}</div>
        </div>

        <div className="breakdown-row">
          <div className="breakdown-label">
            <strong>Contract termination risk</strong>
            Lost contract value if DoD terminates for breach of supply chain clauses
            <div className="citation">35% probability weight of {fmt(profile.contractValue)} contract value</div>
          </div>
          <div className="breakdown-value">{fmtFull(calc.contractTerminationRisk)}</div>
        </div>

        {profile.fcaRisk && (
          <div className="breakdown-row">
            <div className="breakdown-label">
              <strong>False Claims Act exposure</strong>
              Treble damages plus per-claim penalties under 31 U.S.C. §§ 3729-3733
              <div className="citation">Per-claim penalty range: {fmtFull(FCA_PER_CLAIM_MIN)} – {fmtFull(FCA_PER_CLAIM_MAX)} (2024 adjusted)</div>
            </div>
            <div className="breakdown-value">{fmtFull(calc.fcaExposure)}</div>
          </div>
        )}

        {profile.cmmcRisk && (
          <div className="breakdown-row">
            <div className="breakdown-label">
              <strong>CMMC suspension exposure</strong>
              Revenue loss during federal procurement suspension
              <div className="citation">18-month avg suspension × 20% probability × pipeline/3</div>
            </div>
            <div className="breakdown-value">{fmtFull(calc.cmmcExposure)}</div>
          </div>
        )}

        {profile.reputationRisk && (
          <div className="breakdown-row">
            <div className="breakdown-label">
              <strong>Reputational damage</strong>
              Future contracts lost to competitors after public breach
              <div className="citation">25% of 3-year pipeline × 60% probability weight</div>
            </div>
            <div className="breakdown-value">{fmtFull(calc.reputationExposure)}</div>
          </div>
        )}

        <div className="breakdown-total">
          <div>Total Gross Exposure (if breach occurs)</div>
          <div className="breakdown-value">{fmtFull(calc.totalExposure)}</div>
        </div>

        <div className="breakdown-row" style={{marginTop:20,paddingTop:20,borderTop:'1px solid #e2e8f0'}}>

            Expected annual loss (probability-weighted)
          </div>
          <div className="breakdown-value">{fmtFull(calc.expectedAnnualLoss)}</div>
        </div>
      </div>

      <div className="breakdown-section">
        <div className="breakdown-title">CodeLocker Investment & Returns</div>
        
        <div className="breakdown-row">
          <div className="breakdown-label">
            <strong>Year 1 CodeLocker cost</strong>
            Licensing + one-time implementation

          </div>
          <div className="breakdown-value" style={{color:'#0a1628'}}>{fmtFull(calc.firstYearCost)}</div>
        </div>

        <div className="breakdown-row">
          <div className="breakdown-label">
            <strong>Year 2+ annual cost</strong>
            Licensing only, implementation amortized
          </div>
          <div className="breakdown-value" style={{color:'#0a1628'}}>{fmtFull(calc.annualCodeLockerCost)}</div>
        </div>

        <div className="breakdown-row">
          <div className="breakdown-label">
            <strong>Annual risk reduction</strong>
            CodeLocker reduces breach probability by 80%
            <div className="citation">Based on defense-in-depth effectiveness data from IBM 2025</div>
          </div>
          <div className="breakdown-value savings">+{fmtFull(calc.annualSavings)}</div>
        </div>

        <div className="breakdown-total">
          <div>3-Year Net Benefit</div>
          <div className="breakdown-value savings">{fmtFull(calc.threeYearNet)}</div>
        </div>
      </div>

      <div className="breakdown-section">
        <div className="breakdown-title">Why Defense Sector Is Different</div>
        
        <div className="scenario-card">
          <div className="scenario-title">SolarWinds precedent</div>
          <div className="scenario-desc">18,000+ organizations including 9 federal agencies were compromised through a single build pipeline breach. SolarWinds faced a $26M shareholder settlement and SEC charges that continue today. Federal contracts were suspended.</div>
        </div>
        
        <div className="scenario-card">
          <div className="scenario-title">CMMC 2.0 enforcement</div>
          <div className="scenario-desc">Starting in 2026, DoD contractors handling Controlled Unclassified Information must achieve CMMC Level 2 certification. Non-compliance means no contract award, regardless of technical merit.</div>
        </div>
        
        <div className="scenario-card">
          <div className="scenario-title">Section 889 and supply chain clauses</div>
          <div className="scenario-desc">DoD contracts now include aggressive supply chain integrity requirements. A compromise that reaches DoD systems can trigger False Claims Act liability even absent intent, with treble damages.</div>
        </div>
        
        <div className="scenario-card">
          <div className="scenario-title">The reputational tail</div>
          <div className="scenario-desc">Defense contracts are relationship-driven. A single publicly disclosed breach can remove you from competitive sets for 5-10 years. The quantified reputation loss in this model reflects pipeline value walked away by source selection authorities.</div>
        </div>
      </div>

      <div className="cta-box">
        <div className="cta-title">Close the Gap</div>
        <div className="cta-desc">CodeLocker is built around the controls DoD contractors need to satisfy NIST 800-53 Rev 5, CMMC Level 2, and the supply chain integrity clauses that now appear in every major defense contract.</div>
        <a href="https://codelocker.zevainc.com/" className="cta-button">Schedule a Defense Sector Briefing</a>
      </div>
    </div>
  );
}
