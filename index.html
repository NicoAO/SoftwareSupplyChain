<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodeLocker ROI Dashboard</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'IBM Plex Sans', sans-serif; }
    .progress-bar {
      height: 30px;
      background: linear-gradient(90deg, #10B981 0%, #10B981 var(--progress), #E5E7EB var(--progress), #E5E7EB 100%);
      border-radius: 4px;
      transition: all 0.3s ease;
    }
    .expandable-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease-out;
    }
    .expandable-content.open {
      max-height: 2000px;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const BREACH_COSTS = {
      baseline: { global: 4400000, us: 10220000, europe: 5200000, asiaPacific: 4100000 },
      industryMultipliers: { fintech: 1.8, healthcare: 1.6, retail: 1.0, manufacturing: 0.7, technology: 1.3, other: 1.0 },
      sizeAdjustments: { small: 0.7, medium: 1.0, large: 1.4 },
      attackVectors: { supplyChain: 4910000 }
    };

    const CODELOCKER_PRICING = {
      tiers: [
        { min: 1, max: 100, pricePerUser: 975 },
        { min: 101, max: 250, pricePerUser: 895 },
        { min: 251, max: 500, pricePerUser: 845 },
        { min: 501, max: 1000, pricePerUser: 795 },
        { min: 1001, max: Infinity, pricePerUser: 750 }
      ],
      implementationCost: 5000
    };

    const REGULATORY_FINES = {
      gdpr: { maxAmount: 20000000, percentRevenue: 0.04, likelihood: 0.75 },
      ccpa: { perRecord: 7500, likelihood: 0.60 },
      hipaa: { maxAmount: 1500000, likelihood: 0.80 },
      pciDss: { maxAmount: 100000, likelihood: 0.65 }
    };

    const calculateRegulatoryFines = (profile) => {
      let total = 0;
      if (profile.regulations.includes('gdpr')) {
        total += Math.min(REGULATORY_FINES.gdpr.maxAmount, profile.revenue * REGULATORY_FINES.gdpr.percentRevenue) * REGULATORY_FINES.gdpr.likelihood;
      }
      if (profile.regulations.includes('ccpa')) {
        total += profile.customers * REGULATORY_FINES.ccpa.perRecord * 0.05 * REGULATORY_FINES.ccpa.likelihood;
      }
      if (profile.regulations.includes('hipaa')) {
        total += REGULATORY_FINES.hipaa.maxAmount * REGULATORY_FINES.hipaa.likelihood;
      }
      if (profile.regulations.includes('pciDss')) {
        total += REGULATORY_FINES.pciDss.maxAmount * REGULATORY_FINES.pciDss.likelihood;
      }
      return total;
    };

    const calculateBreachCost = (profile) => {
      let baseCost = BREACH_COSTS.attackVectors.supplyChain;
      const regionMultiplier = profile.region === 'us' ? BREACH_COSTS.baseline.us / BREACH_COSTS.baseline.global :
                              profile.region === 'europe' ? BREACH_COSTS.baseline.europe / BREACH_COSTS.baseline.global :
                              profile.region === 'asiaPacific' ? BREACH_COSTS.baseline.asiaPacific / BREACH_COSTS.baseline.global : 1.0;
      const industryMultiplier = BREACH_COSTS.industryMultipliers[profile.industry] || 1.0;
      const employees = profile.developers * 8;
      const sizeMultiplier = employees < 500 ? BREACH_COSTS.sizeAdjustments.small :
                            employees < 5000 ? BREACH_COSTS.sizeAdjustments.medium : BREACH_COSTS.sizeAdjustments.large;
      let adjustedCost = baseCost * regionMultiplier * industryMultiplier * sizeMultiplier;
      adjustedCost += calculateRegulatoryFines(profile);
      const lostBusinessPercent = 0.10 + (sizeMultiplier - 0.7) * 0.15;
      adjustedCost += profile.revenue * lostBusinessPercent;
      return adjustedCost;
    };

    const calculateCodeLockerCost = (developers) => {
      const tier = CODELOCKER_PRICING.tiers.find(t => developers >= t.min && developers <= t.max);
      return developers * tier.pricePerUser;
    };

    const calculateROI = (profile, years, yearlyGrowthRates) => {
      const breachCost = calculateBreachCost(profile);
      const baselineRisk = 0.15;
      const withCodeLockerRisk = 0.03;
      
      let totalInvestment = CODELOCKER_PRICING.implementationCost;
      let currentDevs = profile.developers;
      const yearlyData = [];
      let expectedLossWithout = 0;
      let expectedLossWith = 0;
      
      for (let year = 1; year <= years; year++) {
        const annualCost = calculateCodeLockerCost(currentDevs);
        totalInvestment += annualCost;
        const yearBreachCost = calculateBreachCost({...profile, developers: currentDevs});
        const yearLossWithout = yearBreachCost * baselineRisk;
        const yearLossWith = yearBreachCost * withCodeLockerRisk;
        
        expectedLossWithout += yearLossWithout;
        expectedLossWith += yearLossWith;
        
        yearlyData.push({
          year,
          developers: currentDevs,
          investment: annualCost,
          riskWithout: yearLossWithout,
          riskWith: yearLossWith,
          savings: yearLossWithout - yearLossWith - annualCost
        });
        
        if (year < years) {
          const growthRate = yearlyGrowthRates && yearlyGrowthRates[year - 1] ? 
            (1 + yearlyGrowthRates[year - 1] / 100) : profile.growthRate;
          currentDevs = Math.floor(currentDevs * growthRate);
        }
      }
      
      const netBenefit = (expectedLossWithout - expectedLossWith) - totalInvestment;
      const roiPercent = (netBenefit / totalInvestment) * 100;
      
      return { breachCost, expectedLossWithout, expectedLossWith, totalInvestment, netBenefit, roiPercent, yearlyData };
    };

    const ExpandableSection = ({ title, children, defaultOpen = false }) => {
      const [isOpen, setIsOpen] = useState(defaultOpen);
      
      return (
        <div className="border-2 border-gray-200 rounded-lg mb-4 overflow-hidden">
          <button
            onClick={() => setIsOpen(!isOpen)}
            className="w-full px-6 py-4 bg-gray-50 hover:bg-gray-100 transition-colors flex justify-between items-center"
          >
            <span className="font-semibold text-gray-900">{title}</span>
            <svg
              className={`w-5 h-5 text-gray-600 transition-transform ${isOpen ? 'rotate-180' : ''}`}
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7" />
            </svg>
          </button>
          <div className={`expandable-content ${isOpen ? 'open' : ''}`}>
            <div className="px-6 py-4 bg-white">
              {children}
            </div>
          </div>
        </div>
      );
    };

    const Dashboard = () => {
      const [activeTab, setActiveTab] = useState('calculator');
      const [profile, setProfile] = useState({
        industry: 'fintech',
        developers: 50,
        revenue: 10000000,
        customers: 50000,
        region: 'us',
        regulations: ['gdpr', 'ccpa'],
        growthRate: 1.5
      });
      
      const [useGrowth, setUseGrowth] = useState(true);
      const [projectionYears, setProjectionYears] = useState(3);
      const [yearByYearGrowth, setYearByYearGrowth] = useState(false);
      const [yearlyGrowthRates, setYearlyGrowthRates] = useState([50, 50, 50, 50, 50]);

      const roi = calculateROI(profile, projectionYears, yearByYearGrowth ? yearlyGrowthRates : null);

      const updateProfile = (key, value) => {
        setProfile(prev => ({ ...prev, [key]: value }));
      };

      const toggleRegulation = (reg) => {
        setProfile(prev => ({
          ...prev,
          regulations: prev.regulations.includes(reg) ? prev.regulations.filter(r => r !== reg) : [...prev.regulations, reg]
        }));
      };

      const updateYearlyGrowth = (yearIndex, value) => {
        setYearlyGrowthRates(prev => {
          const newRates = [...prev];
          newRates[yearIndex] = value;
          return newRates;
        });
      };

      return (
        <div className="min-h-screen bg-gray-50">
          <header className="bg-white border-b-2 border-gray-200 sticky top-0 z-50">
            <div className="max-w-7xl mx-auto px-6 py-4">
              <div className="flex items-center justify-between">
                <div className="flex items-center space-x-3">
                  <a href="https://codelocker.zevainc.com/" className="flex items-center space-x-3 hover:opacity-80 transition-opacity">
                    <svg className="w-12 h-12" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                      <rect width="48" height="48" rx="8" fill="url(#gradient)"/>
                      <path d="M24 14V18M18 24H14M34 24H30M24 30V34" stroke="white" strokeWidth="2.5" strokeLinecap="round"/>
                      <rect x="19" y="19" width="10" height="10" rx="2" stroke="white" strokeWidth="2.5"/>
                      <path d="M24 21V23M24 25V27" stroke="white" strokeWidth="2" strokeLinecap="round"/>
                      <defs>
                        <linearGradient id="gradient" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
                          <stop stopColor="#2563EB"/>
                          <stop offset="1" stopColor="#1D4ED8"/>
                        </linearGradient>
                      </defs>
                    </svg>
                    <div>
                      <h1 className="text-2xl font-bold text-gray-900">CodeLocker</h1>
                      <p className="text-xs text-gray-500">by Zeva Inc.</p>
                    </div>
                  </a>
                </div>
                <a href="https://codelocker.zevainc.com/" className="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-blue-700 transition-colors">Get Started</a>
              </div>
            </div>
          </header>

          <nav className="bg-white border-b-2 border-gray-200">
            <div className="max-w-7xl mx-auto px-6 flex space-x-8">
              <button onClick={() => setActiveTab('problem')} className={`py-4 px-2 border-b-4 font-medium text-sm transition-colors ${activeTab === 'problem' ? 'border-blue-600 text-blue-600' : 'border-transparent text-gray-600 hover:text-gray-900'}`}>The Problem</button>
              <button onClick={() => setActiveTab('calculator')} className={`py-4 px-2 border-b-4 font-medium text-sm transition-colors ${activeTab === 'calculator' ? 'border-blue-600 text-blue-600' : 'border-transparent text-gray-600 hover:text-gray-900'}`}>ROI Calculator</button>
            </div>
          </nav>

          <main className="max-w-7xl mx-auto px-6 py-12">
            {activeTab === 'problem' && (
              <div>
                <h1 className="text-5xl font-bold text-gray-900 mb-6 text-center">Is Your Software Supply Chain Secure?</h1>
                <div className="bg-gradient-to-r from-red-50 to-orange-50 border-2 border-red-200 rounded-lg p-8 max-w-3xl mx-auto mb-12">
                  <div className="text-sm font-semibold text-red-600 mb-2">AVERAGE SUPPLY CHAIN BREACH COST</div>
                  <div className="text-6xl font-bold text-red-700">$4.91M</div>
                  <div className="text-sm text-gray-600 mt-4">US Average: $10.22M | Global Average: $4.4M</div>
                </div>
                
                <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
                  <div className="bg-white border-2 border-gray-200 rounded-lg p-6">
                    <div className="text-sm font-medium text-gray-600 mb-2">Supply Chain Breaches</div>
                    <div className="text-3xl font-bold text-red-600">30%</div>
                    <div className="text-sm text-gray-500">Of all breaches in 2024 (doubled YoY)</div>
                  </div>
                  <div className="bg-white border-2 border-gray-200 rounded-lg p-6">
                    <div className="text-sm font-medium text-gray-600 mb-2">AI Security Incidents</div>
                    <div className="text-3xl font-bold text-red-600">30%</div>
                    <div className="text-sm text-gray-500">Caused by supply chain compromise</div>
                  </div>
                  <div className="bg-white border-2 border-gray-200 rounded-lg p-6">
                    <div className="text-sm font-medium text-gray-600 mb-2">Resolution Time</div>
                    <div className="text-3xl font-bold text-red-600">276 days</div>
                    <div className="text-sm text-gray-500">For multi-environment breaches</div>
                  </div>
                </div>

                <div className="max-w-4xl mx-auto mb-12">
                  <h2 className="text-3xl font-bold text-gray-900 mb-6">Understanding the Risk</h2>
                  
                  <ExpandableSection title="What is a Supply Chain Attack?" defaultOpen={true}>
                    <p className="text-gray-700 mb-4">
                      A supply chain attack occurs when attackers compromise a trusted third-party software component, library, or service that organizations depend on. Instead of attacking your systems directly, hackers inject malicious code into widely-used dependencies that automatically get distributed to thousands of downstream users.
                    </p>
                    <p className="text-gray-700">
                      This attack vector is particularly dangerous because it exploits the trust relationships between software vendors and their customers. When you download a popular npm package, Python library, or software update, you assume it's safe. Supply chain attackers break that assumption.
                    </p>
                  </ExpandableSection>

                  <ExpandableSection title="Case Study: The SolarWinds Attack (2020)">
                    <div className="space-y-4">
                      <div>
                        <h4 className="font-bold text-gray-900 mb-2">The Breach</h4>
                        <p className="text-gray-700">
                          In December 2020, cybersecurity firm FireEye discovered one of the most sophisticated supply chain attacks in history. Russian state-sponsored hackers had compromised SolarWinds' Orion platform—network monitoring software used by 18,000+ organizations including Fortune 500 companies and U.S. government agencies.
                        </p>
                      </div>
                      
                      <div>
                        <h4 className="font-bold text-gray-900 mb-2">How It Worked</h4>
                        <p className="text-gray-700 mb-2">The attackers inserted malicious code (dubbed "SUNBURST") into SolarWinds' software build process. When SolarWinds released a routine software update, that poisoned update was digitally signed with SolarWinds' legitimate certificate and automatically pushed to customers worldwide.</p>
                        <ul className="list-disc list-inside text-gray-700 space-y-1">
                          <li>March 2020: Hackers gain access to SolarWinds build environment</li>
                          <li>May-June 2020: Malicious code inserted into Orion updates</li>
                          <li>Months of undetected access to victim networks</li>
                          <li>December 2020: Attack discovered and disclosed</li>
                        </ul>
                      </div>

                      <div>
                        <h4 className="font-bold text-gray-900 mb-2">The Impact</h4>
                        <div className="bg-red-50 border border-red-200 rounded p-4">
                          <ul className="text-gray-700 space-y-2">
                            <li className="flex items-start">
                              <span className="text-red-600 mr-2">•</span>
                              <span>18,000+ organizations received the compromised update</span>
                            </li>
                            <li className="flex items-start">
                              <span className="text-red-600 mr-2">•</span>
                              <span>100+ companies and 9 U.S. federal agencies fully breached</span>
                            </li>
                            <li className="flex items-start">
                              <span className="text-red-600 mr-2">•</span>
                              <span>Estimated economic damage in the billions</span>
                            </li>
                            <li className="flex items-start">
                              <span className="text-red-600 mr-2">•</span>
                              <span>Access to sensitive government and corporate data for months</span>
                            </li>
                            <li className="flex items-start">
                              <span className="text-red-600 mr-2">•</span>
                              <span>Complete remediation took over a year for many victims</span>
                            </li>
                          </ul>
                        </div>
                      </div>

                      <div>
                        <h4 className="font-bold text-gray-900 mb-2">Why It Matters for You</h4>
                        <p className="text-gray-700">
                          The SolarWinds attack demonstrated that traditional security measures—firewalls, antivirus, intrusion detection—are ineffective against supply chain compromises. The malicious code came from a trusted source, signed with valid certificates, and behaved like legitimate software. Without code signing verification and supply chain integrity controls, there's no way to detect these attacks before deployment.
                        </p>
                      </div>

                      <div className="bg-blue-50 border border-blue-200 rounded p-4">
                        <h4 className="font-bold text-blue-900 mb-2">How CodeLocker Prevents This</h4>
                        <ul className="text-gray-700 space-y-2">
                          <li className="flex items-start">
                            <span className="text-blue-600 mr-2">✓</span>
                            <span><strong>Commit-level code signing:</strong> Every code change is cryptographically signed by authorized developers</span>
                          </li>
                          <li className="flex items-start">
                            <span className="text-blue-600 mr-2">✓</span>
                            <span><strong>Binary verification:</strong> Only code signed by your organization can execute in your environment</span>
                          </li>
                          <li className="flex items-start">
                            <span className="text-blue-600 mr-2">✓</span>
                            <span><strong>SBOM tracking:</strong> Complete visibility into all dependencies and third-party components</span>
                          </li>
                          <li className="flex items-start">
                            <span className="text-blue-600 mr-2">✓</span>
                            <span><strong>Automated CI/CD integration:</strong> Security verification happens at build time, not after deployment</span>
                          </li>
                        </ul>
                      </div>
                    </div>
                  </ExpandableSection>

                  <ExpandableSection title="Recent Supply Chain Attacks (2024-2025)">
                    <div className="space-y-4">
                      <div>
                        <h4 className="font-bold text-gray-900">XZ Utils Backdoor (April 2024)</h4>
                        <p className="text-gray-700">A backdoor was discovered in XZ Utils, a compression library used across Linux distributions. The attack was the result of a multi-year social engineering campaign where attackers gained maintainer access to inject malicious code. This highlights how patient attackers can be when targeting open-source supply chains.</p>
                      </div>
                      <div>
                        <h4 className="font-bold text-gray-900">3CX VoIP Attack (2023-2024)</h4>
                        <p className="text-gray-700">Hackers compromised 3CX's VoIP software, affecting 600,000+ organizations globally. The attack propagated through legitimate software updates, similar to SolarWinds. Resolution required complete infrastructure rebuilds for many victims.</p>
                      </div>
                      <div>
                        <h4 className="font-bold text-gray-900">NPM Package Compromises (Ongoing)</h4>
                        <p className="text-gray-700">Throughout 2024, researchers discovered numerous malicious packages in npm (JavaScript package registry) and PyPI (Python Package Index). Attackers use typosquatting and dependency confusion to inject malware into development pipelines.</p>
                      </div>
                    </div>
                  </ExpandableSection>

                  <ExpandableSection title="Why Traditional Security Fails">
                    <p className="text-gray-700 mb-4">
                      Most security tools focus on perimeter defense—keeping attackers out of your network. But supply chain attacks bypass the perimeter entirely by compromising code before it ever reaches your infrastructure.
                    </p>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                      <div className="bg-red-50 border border-red-200 rounded p-4">
                        <h4 className="font-bold text-red-900 mb-2">What Doesn't Work</h4>
                        <ul className="text-gray-700 space-y-1 text-sm">
                          <li>• Firewalls (code comes from trusted sources)</li>
                          <li>• Antivirus (malicious code is signed and trusted)</li>
                          <li>• Network monitoring (traffic appears legitimate)</li>
                          <li>• Penetration testing (vulnerability exists upstream)</li>
                        </ul>
                      </div>
                      <div className="bg-green-50 border border-green-200 rounded p-4">
                        <h4 className="font-bold text-green-900 mb-2">What Does Work</h4>
                        <ul className="text-gray-700 space-y-1 text-sm">
                          <li>• Code signing and verification</li>
                          <li>• Software bill of materials (SBOM)</li>
                          <li>• Zero Trust architecture</li>
                          <li>• Supply chain integrity monitoring</li>
                        </ul>
                      </div>
                    </div>
                  </ExpandableSection>
                </div>

                <div className="text-center">
                  <button onClick={() => setActiveTab('calculator')} className="bg-blue-600 text-white px-8 py-4 rounded-lg font-semibold text-lg hover:bg-blue-700 transition-colors">Calculate Your ROI</button>
                </div>
              </div>
            )}

            {activeTab === 'calculator' && (
              <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div className="lg:col-span-1">
                  <div className="bg-white border-2 border-gray-200 rounded-lg p-6 sticky top-24">
                    <h2 className="text-xl font-bold text-gray-900 mb-6">Company Profile</h2>
                    
                    <div className="space-y-6">
                      <div>
                        <label className="block text-sm font-semibold text-gray-700 mb-2">Industry</label>
                        <select value={profile.industry} onChange={(e) => updateProfile('industry', e.target.value)} className="w-full border-2 border-gray-300 rounded-lg px-4 py-2 focus:border-blue-500 focus:outline-none">
                          <option value="fintech">FinTech</option>
                          <option value="healthcare">Healthcare</option>
                          <option value="retail">Retail</option>
                          <option value="manufacturing">Manufacturing</option>
                          <option value="technology">Technology</option>
                          <option value="other">Other</option>
                        </select>
                      </div>

                      <div>
                        <label className="block text-sm font-semibold text-gray-700 mb-2">Number of Developers</label>
                        <input 
                          type="number" 
                          min="1" 
                          max="10000" 
                          value={profile.developers} 
                          onChange={(e) => updateProfile('developers', parseInt(e.target.value) || 1)} 
                          className="w-full border-2 border-gray-300 rounded-lg px-4 py-2 mb-2 focus:border-blue-500 focus:outline-none"
                        />
                        <input type="range" min="1" max="1000" value={profile.developers} onChange={(e) => updateProfile('developers', parseInt(e.target.value))} className="w-full" />
                        <div className="flex justify-between text-xs text-gray-500 mt-1">
                          <span>1</span>
                          <span>1000+</span>
                        </div>
                      </div>

                      <div>
                        <label className="block text-sm font-semibold text-gray-700 mb-2">Annual Revenue</label>
                        <input type="text" value={`$${profile.revenue.toLocaleString()}`} onChange={(e) => updateProfile('revenue', parseInt(e.target.value.replace(/[^0-9]/g, '')) || 0)} className="w-full border-2 border-gray-300 rounded-lg px-4 py-2 focus:border-blue-500 focus:outline-none" />
                      </div>

                      <div>
                        <label className="block text-sm font-semibold text-gray-700 mb-2">Number of Customers</label>
                        <input 
                          type="number" 
                          min="1" 
                          max="10000000" 
                          value={profile.customers} 
                          onChange={(e) => updateProfile('customers', parseInt(e.target.value) || 1)} 
                          className="w-full border-2 border-gray-300 rounded-lg px-4 py-2 mb-2 focus:border-blue-500 focus:outline-none"
                        />
                        <input type="range" min="10" max="1000000" step="10" value={profile.customers} onChange={(e) => updateProfile('customers', parseInt(e.target.value))} className="w-full" />
                        <div className="flex justify-between text-xs text-gray-500 mt-1">
                          <span>10</span>
                          <span>1M+</span>
                        </div>
                      </div>

                      <div>
                        <label className="block text-sm font-semibold text-gray-700 mb-2">Region</label>
                        <select value={profile.region} onChange={(e) => updateProfile('region', e.target.value)} className="w-full border-2 border-gray-300 rounded-lg px-4 py-2 focus:border-blue-500 focus:outline-none">
                          <option value="us">United States</option>
                          <option value="europe">Europe</option>
                          <option value="asiaPacific">Asia-Pacific</option>
                          <option value="other">Other</option>
                        </select>
                      </div>

                      <div>
                        <label className="block text-sm font-semibold text-gray-700 mb-2">Regulations</label>
                        <div className="space-y-2">
                          {['gdpr', 'ccpa', 'hipaa', 'pciDss'].map(reg => (
                            <label key={reg} className="flex items-center">
                              <input type="checkbox" checked={profile.regulations.includes(reg)} onChange={() => toggleRegulation(reg)} className="mr-2" />
                              <span className="text-sm text-gray-700">{reg.toUpperCase()}</span>
                            </label>
                          ))}
                        </div>
                      </div>

                      <div className="border-t-2 border-gray-200 pt-6">
                        <div className="flex items-center justify-between mb-4">
                          <label className="block text-sm font-semibold text-gray-700">Growth Projection</label>
                          <button
                            onClick={() => setUseGrowth(!useGrowth)}
                            className={`px-3 py-1 rounded text-sm font-medium transition-colors ${useGrowth ? 'bg-blue-600 text-white' : 'bg-gray-200 text-gray-700'}`}
                          >
                            {useGrowth ? 'ON' : 'OFF'}
                          </button>
                        </div>

                        {useGrowth && (
                          <>
                            <div className="mb-4">
                              <label className="block text-sm font-semibold text-gray-700 mb-2">Projection Horizon: {projectionYears} years</label>
                              <input 
                                type="range" 
                                min="1" 
                                max="10" 
                                value={projectionYears} 
                                onChange={(e) => setProjectionYears(parseInt(e.target.value))} 
                                className="w-full" 
                              />
                              <div className="flex justify-between text-xs text-gray-500 mt-1">
                                <span>1 year</span>
                                <span>10 years</span>
                              </div>
                            </div>

                            <div className="mb-4">
                              <label className="flex items-center text-sm text-gray-700 mb-2">
                                <input 
                                  type="checkbox" 
                                  checked={yearByYearGrowth} 
                                  onChange={(e) => setYearByYearGrowth(e.target.checked)} 
                                  className="mr-2"
                                />
                                Year-by-year growth rates
                              </label>
                            </div>

                            {!yearByYearGrowth ? (
                              <div>
                                <label className="block text-sm font-semibold text-gray-700 mb-2">
                                  Overall Growth Rate: {((profile.growthRate - 1) * 100).toFixed(1)}% per year
                                </label>
                                <input 
                                  type="number"
                                  min="0"
                                  max="300"
                                  step="0.5"
                                  value={((profile.growthRate - 1) * 100).toFixed(1)}
                                  onChange={(e) => updateProfile('growthRate', 1 + (parseFloat(e.target.value) || 0) / 100)}
                                  className="w-full border-2 border-gray-300 rounded-lg px-4 py-2 mb-2 focus:border-blue-500 focus:outline-none"
                                />
                                <input 
                                  type="range" 
                                  min="0" 
                                  max="200" 
                                  step="1" 
                                  value={(profile.growthRate - 1) * 100} 
                                  onChange={(e) => updateProfile('growthRate', 1 + parseFloat(e.target.value) / 100)} 
                                  className="w-full" 
                                />
                                <div className="flex justify-between text-xs text-gray-500 mt-1">
                                  <span>0%</span>
                                  <span>200%</span>
                                </div>
                              </div>
                            ) : (
                              <div className="space-y-3">
                                {Array.from({ length: Math.min(projectionYears - 1, 5) }).map((_, idx) => (
                                  <div key={idx}>
                                    <label className="block text-xs font-semibold text-gray-700 mb-1">
                                      Year {idx + 1} → {idx + 2}: {yearlyGrowthRates[idx]}%
                                    </label>
                                    <input 
                                      type="range" 
                                      min="0" 
                                      max="200" 
                                      value={yearlyGrowthRates[idx]} 
                                      onChange={(e) => updateYearlyGrowth(idx, parseInt(e.target.value))} 
                                      className="w-full" 
                                    />
                                  </div>
                                ))}
                              </div>
                            )}
                          </>
                        )}
                      </div>
                    </div>
                  </div>
                </div>

                <div className="lg:col-span-2 space-y-8">
                  <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div className="bg-gradient-to-br from-red-50 to-white border-2 border-red-200 rounded-lg p-6">
                      <div className="text-sm font-medium text-gray-600 mb-2">Potential Breach Cost</div>
                      <div className="text-3xl font-bold text-gray-900">${(roi.breachCost / 1000000).toFixed(2)}M</div>
                      <div className="text-sm text-gray-500">Based on your profile</div>
                    </div>
                    <div className="bg-gradient-to-br from-blue-50 to-white border-2 border-blue-200 rounded-lg p-6">
                      <div className="text-sm font-medium text-gray-600 mb-2">With CodeLocker</div>
                      <div className="text-3xl font-bold text-gray-900">${(roi.expectedLossWith / 1000000).toFixed(2)}M</div>
                      <div className="text-sm text-gray-500">{projectionYears}-year expected loss</div>
                    </div>
                    <div className="bg-gradient-to-br from-green-50 to-white border-2 border-green-200 rounded-lg p-6">
                      <div className="text-sm font-medium text-gray-600 mb-2">Your Net ROI</div>
                      <div className="text-3xl font-bold text-gray-900">${(roi.netBenefit / 1000000).toFixed(2)}M</div>
                      <div className="text-sm text-gray-500">{roi.roiPercent.toFixed(0)}% return</div>
                    </div>
                  </div>

                  <div className="bg-white border-2 border-gray-200 rounded-lg p-6">
                    <h3 className="text-xl font-bold text-gray-900 mb-4">{projectionYears}-Year Projection</h3>
                    <div className="overflow-x-auto">
                      <table className="w-full text-sm">
                        <thead className="bg-gray-50">
                          <tr>
                            <th className="px-4 py-3 text-left font-semibold text-gray-900">Year</th>
                            <th className="px-4 py-3 text-left font-semibold text-gray-900">Developers</th>
                            <th className="px-4 py-3 text-left font-semibold text-gray-900">Investment</th>
                            <th className="px-4 py-3 text-left font-semibold text-gray-900">Risk (without)</th>
                            <th className="px-4 py-3 text-left font-semibold text-gray-900">Risk (with)</th>
                            <th className="px-4 py-3 text-left font-semibold text-gray-900">Net Benefit</th>
                          </tr>
                        </thead>
                        <tbody className="divide-y divide-gray-200">
                          {roi.yearlyData.map((year, idx) => (
                            <tr key={idx} className="hover:bg-gray-50">
                              <td className="px-4 py-3 font-medium text-gray-900">{year.year}</td>
                              <td className="px-4 py-3 text-gray-700">{year.developers}</td>
                              <td className="px-4 py-3 text-gray-700">${(year.investment / 1000).toFixed(0)}K</td>
                              <td className="px-4 py-3 text-red-600">${(year.riskWithout / 1000).toFixed(0)}K</td>
                              <td className="px-4 py-3 text-green-600">${(year.riskWith / 1000).toFixed(0)}K</td>
                              <td className="px-4 py-3 font-semibold text-green-700">${(year.savings / 1000).toFixed(0)}K</td>
                            </tr>
                          ))}
                          <tr className="bg-gray-50 font-bold">
                            <td className="px-4 py-3 text-gray-900">Total</td>
                            <td className="px-4 py-3"></td>
                            <td className="px-4 py-3 text-blue-700">${(roi.totalInvestment / 1000).toFixed(0)}K</td>
                            <td className="px-4 py-3 text-red-700">${(roi.expectedLossWithout / 1000).toFixed(0)}K</td>
                            <td className="px-4 py-3 text-green-700">${(roi.expectedLossWith / 1000).toFixed(0)}K</td>
                            <td className="px-4 py-3 text-green-800">${(roi.netBenefit / 1000).toFixed(0)}K</td>
                          </tr>
                        </tbody>
                      </table>
                    </div>
                  </div>

                  <div className="bg-white border-2 border-gray-200 rounded-lg p-6">
                    <h3 className="text-xl font-bold text-gray-900 mb-4">Risk Reduction</h3>
                    <div className="space-y-4">
                      <div>
                        <div className="flex justify-between text-sm mb-2">
                          <span className="font-semibold text-gray-700">Without CodeLocker</span>
                          <span className="text-red-600 font-bold">15% annual breach probability</span>
                        </div>
                        <div className="h-8 bg-red-100 rounded-lg flex items-center px-4">
                          <div className="h-4 bg-red-600 rounded" style={{width: '15%'}}></div>
                        </div>
                      </div>
                      <div>
                        <div className="flex justify-between text-sm mb-2">
                          <span className="font-semibold text-gray-700">With CodeLocker</span>
                          <span className="text-green-600 font-bold">3% annual breach probability (80% reduction)</span>
                        </div>
                        <div className="h-8 bg-green-100 rounded-lg flex items-center px-4">
                          <div className="h-4 bg-green-600 rounded" style={{width: '3%'}}></div>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            )}
          </main>

          <footer className="bg-gray-900 text-white mt-16">
            <div className="max-w-7xl mx-auto px-6 py-12">
              <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                <div>
                  <a href="https://codelocker.zevainc.com/" className="hover:opacity-80 transition-opacity">
                    <h3 className="font-bold text-xl mb-4">CodeLocker by Zeva Inc.</h3>
                  </a>
                  <p className="text-gray-400 text-sm">Enterprise-grade software supply chain security powered by Zero Trust architecture.</p>
                  <div className="mt-4">
                    <a href="https://codelocker.zevainc.com/" className="text-sm text-blue-400 hover:text-blue-300 transition-colors">Visit CodeLocker →</a>
                  </div>
                </div>
                <div>
                  <h4 className="font-semibold mb-4">Data Sources</h4>
                  <ul className="text-sm text-gray-400 space-y-2">
                    <li>IBM Cost of Data Breach Report 2025</li>
                    <li>Verizon DBIR 2025</li>
                    <li>Coalition Cyber Claims Report 2025</li>
                    <li>CISA Cost of Cyber Incidents Study</li>
                  </ul>
                </div>
                <div>
                  <h4 className="font-semibold mb-4">Contact</h4>
                  <p className="text-sm text-gray-400 mb-4">Ready to secure your supply chain?</p>
                  <a href="https://codelocker.zevainc.com/" className="inline-block bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700 transition-colors">Get Started</a>
                </div>
              </div>
              <div className="border-t border-gray-800 mt-8 pt-8 text-center text-sm text-gray-500">
                <p>© 2026 <a href="https://codelocker.zevainc.com/" className="text-gray-400 hover:text-white transition-colors">Zeva Inc.</a> All rights reserved.</p>
                <p className="mt-2">Columbia MSBA Capstone Project</p>
              </div>
            </div>
          </footer>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Dashboard />);
  </script>
</body>
</html>
