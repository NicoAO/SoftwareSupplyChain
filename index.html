<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodeLocker ROI Dashboard</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React and ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'IBM Plex Sans', sans-serif; }
    .progress-bar {
      height: 30px;
      background: linear-gradient(90deg, #10B981 0%, #10B981 var(--progress), #E5E7EB var(--progress), #E5E7EB 100%);
      border-radius: 4px;
      transition: all 0.3s ease;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // Calculations
    const BREACH_COSTS = {
      baseline: { global: 4400000, us: 10220000, europe: 5200000, asiaPacific: 4100000 },
      industryMultipliers: { fintech: 1.8, healthcare: 1.6, retail: 1.0, manufacturing: 0.7, technology: 1.3, other: 1.0 },
      sizeAdjustments: { small: 0.7, medium: 1.0, large: 1.4 },
      attackVectors: { supplyChain: 4910000 }
    };

    const CODELOCKER_PRICING = {
      tiers: [
        { min: 1, max: 100, pricePerUser: 975 },
        { min: 101, max: 250, pricePerUser: 895 },
        { min: 251, max: 500, pricePerUser: 845 },
        { min: 501, max: 1000, pricePerUser: 795 },
        { min: 1001, max: Infinity, pricePerUser: 750 }
      ],
      implementationCost: 5000
    };

    const REGULATORY_FINES = {
      gdpr: { maxAmount: 20000000, percentRevenue: 0.04, likelihood: 0.75 },
      ccpa: { perRecord: 7500, likelihood: 0.60 },
      hipaa: { maxAmount: 1500000, likelihood: 0.80 },
      pciDss: { maxAmount: 100000, likelihood: 0.65 }
    };

    const calculateRegulatoryFines = (profile) => {
      let total = 0;
      if (profile.regulations.includes('gdpr')) {
        total += Math.min(REGULATORY_FINES.gdpr.maxAmount, profile.revenue * REGULATORY_FINES.gdpr.percentRevenue) * REGULATORY_FINES.gdpr.likelihood;
      }
      if (profile.regulations.includes('ccpa')) {
        total += profile.customers * REGULATORY_FINES.ccpa.perRecord * 0.05 * REGULATORY_FINES.ccpa.likelihood;
      }
      if (profile.regulations.includes('hipaa')) {
        total += REGULATORY_FINES.hipaa.maxAmount * REGULATORY_FINES.hipaa.likelihood;
      }
      if (profile.regulations.includes('pciDss')) {
        total += REGULATORY_FINES.pciDss.maxAmount * REGULATORY_FINES.pciDss.likelihood;
      }
      return total;
    };

    const calculateBreachCost = (profile) => {
      let baseCost = BREACH_COSTS.attackVectors.supplyChain;
      const regionMultiplier = profile.region === 'us' ? BREACH_COSTS.baseline.us / BREACH_COSTS.baseline.global :
                              profile.region === 'europe' ? BREACH_COSTS.baseline.europe / BREACH_COSTS.baseline.global :
                              profile.region === 'asiaPacific' ? BREACH_COSTS.baseline.asiaPacific / BREACH_COSTS.baseline.global : 1.0;
      const industryMultiplier = BREACH_COSTS.industryMultipliers[profile.industry] || 1.0;
      const employees = profile.developers * 8;
      const sizeMultiplier = employees < 500 ? BREACH_COSTS.sizeAdjustments.small :
                            employees < 5000 ? BREACH_COSTS.sizeAdjustments.medium : BREACH_COSTS.sizeAdjustments.large;
      let adjustedCost = baseCost * regionMultiplier * industryMultiplier * sizeMultiplier;
      adjustedCost += calculateRegulatoryFines(profile);
      const lostBusinessPercent = 0.10 + (sizeMultiplier - 0.7) * 0.15;
      adjustedCost += profile.revenue * lostBusinessPercent;
      return adjustedCost;
    };

    const calculateCodeLockerCost = (developers) => {
      const tier = CODELOCKER_PRICING.tiers.find(t => developers >= t.min && developers <= t.max);
      return developers * tier.pricePerUser;
    };

    const calculateROI = (profile, years = 3) => {
      const breachCost = calculateBreachCost(profile);
      const baselineRisk = 0.15;
      const withCodeLockerRisk = 0.03;
      const expectedLossWithout = breachCost * baselineRisk * years;
      const expectedLossWith = breachCost * withCodeLockerRisk * years;
      const growthRate = profile.growthRate || 1.5;
      let totalInvestment = CODELOCKER_PRICING.implementationCost;
      let currentDevs = profile.developers;
      const yearlyData = [];
      
      for (let year = 1; year <= years; year++) {
        const annualCost = calculateCodeLockerCost(currentDevs);
        totalInvestment += annualCost;
        const yearBreachCost = calculateBreachCost({...profile, developers: currentDevs});
        yearlyData.push({
          year,
          developers: currentDevs,
          investment: annualCost,
          riskWithout: yearBreachCost * baselineRisk,
          riskWith: yearBreachCost * withCodeLockerRisk,
          savings: (yearBreachCost * baselineRisk) - (yearBreachCost * withCodeLockerRisk) - annualCost
        });
        currentDevs = Math.floor(currentDevs * growthRate);
      }
      
      const netBenefit = (expectedLossWithout - expectedLossWith) - totalInvestment;
      const roiPercent = (netBenefit / totalInvestment) * 100;
      
      return { breachCost, expectedLossWithout, expectedLossWith, totalInvestment, netBenefit, roiPercent, yearlyData };
    };

    const Dashboard = () => {
      const [activeTab, setActiveTab] = useState('calculator');
      const [profile, setProfile] = useState({
        industry: 'fintech',
        developers: 50,
        revenue: 10000000,
        customers: 50000,
        region: 'us',
        regulations: ['gdpr', 'ccpa'],
        growthRate: 1.5
      });

      const roi = calculateROI(profile, 3);

      const updateProfile = (key, value) => {
        setProfile(prev => ({ ...prev, [key]: value }));
      };

      const toggleRegulation = (reg) => {
        setProfile(prev => ({
          ...prev,
          regulations: prev.regulations.includes(reg) ? prev.regulations.filter(r => r !== reg) : [...prev.regulations, reg]
        }));
      };

      return (
        <div className="min-h-screen bg-gray-50">
          <header className="bg-white border-b-2 border-gray-200 sticky top-0 z-50">
            <div className="max-w-7xl mx-auto px-6 py-4">
              <div className="flex items-center justify-between">
                <div className="flex items-center space-x-3">
                  <a href="https://codelocker.zevainc.com/" className="flex items-center space-x-3">
                    <div className="w-10 h-10 bg-gradient-to-br from-blue-600 to-blue-700 rounded-lg flex items-center justify-center text-white font-bold">CL</div>
                    <div>
                      <h1 className="text-2xl font-bold text-gray-900">CodeLocker</h1>
                      <p className="text-xs text-gray-500">by Zeva Inc.</p>
                    </div>
                  </a>
                </div>
                <a href="https://codelocker.zevainc.com/" className="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-blue-700">Get Started</a>
              </div>
            </div>
          </header>

          <nav className="bg-white border-b-2 border-gray-200">
            <div className="max-w-7xl mx-auto px-6 flex space-x-8">
              <button onClick={() => setActiveTab('problem')} className={`py-4 px-2 border-b-4 font-medium text-sm ${activeTab === 'problem' ? 'border-blue-600 text-blue-600' : 'border-transparent text-gray-600 hover:text-gray-900'}`}>The Problem</button>
              <button onClick={() => setActiveTab('calculator')} className={`py-4 px-2 border-b-4 font-medium text-sm ${activeTab === 'calculator' ? 'border-blue-600 text-blue-600' : 'border-transparent text-gray-600 hover:text-gray-900'}`}>ROI Calculator</button>
            </div>
          </nav>

          <main className="max-w-7xl mx-auto px-6 py-12">
            {activeTab === 'problem' && (
              <div>
                <h1 className="text-5xl font-bold text-gray-900 mb-6 text-center">The $4.91 Million Question</h1>
                <p className="text-2xl text-gray-600 mb-8 text-center">Is Your Software Supply Chain Secure?</p>
                <div className="bg-gradient-to-r from-red-50 to-orange-50 border-2 border-red-200 rounded-lg p-8 max-w-3xl mx-auto mb-12">
                  <div className="text-sm font-semibold text-red-600 mb-2">AVERAGE SUPPLY CHAIN BREACH COST</div>
                  <div className="text-6xl font-bold text-red-700">$4.91M</div>
                  <div className="text-sm text-gray-600 mt-4">US Average: $10.22M | Global Average: $4.4M</div>
                </div>
                
                <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
                  <div className="bg-white border-2 border-gray-200 rounded-lg p-6">
                    <div className="text-sm font-medium text-gray-600 mb-2">Supply Chain Breaches</div>
                    <div className="text-3xl font-bold text-red-600">30%</div>
                    <div className="text-sm text-gray-500">Of all breaches in 2024 (doubled YoY)</div>
                  </div>
                  <div className="bg-white border-2 border-gray-200 rounded-lg p-6">
                    <div className="text-sm font-medium text-gray-600 mb-2">AI Security Incidents</div>
                    <div className="text-3xl font-bold text-red-600">30%</div>
                    <div className="text-sm text-gray-500">Caused by supply chain compromise</div>
                  </div>
                  <div className="bg-white border-2 border-gray-200 rounded-lg p-6">
                    <div className="text-sm font-medium text-gray-600 mb-2">Resolution Time</div>
                    <div className="text-3xl font-bold text-red-600">276 days</div>
                    <div className="text-sm text-gray-500">For multi-environment breaches</div>
                  </div>
                </div>

                <div className="text-center">
                  <button onClick={() => setActiveTab('calculator')} className="bg-blue-600 text-white px-8 py-4 rounded-lg font-semibold text-lg hover:bg-blue-700">Calculate Your ROI</button>
                </div>
              </div>
            )}

            {activeTab === 'calculator' && (
              <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div className="lg:col-span-1">
                  <div className="bg-white border-2 border-gray-200 rounded-lg p-6 sticky top-24">
                    <h2 className="text-xl font-bold text-gray-900 mb-6">Company Profile</h2>
                    
                    <div className="space-y-6">
                      <div>
                        <label className="block text-sm font-semibold text-gray-700 mb-2">Industry</label>
                        <select value={profile.industry} onChange={(e) => updateProfile('industry', e.target.value)} className="w-full border-2 border-gray-300 rounded-lg px-4 py-2">
                          <option value="fintech">FinTech</option>
                          <option value="healthcare">Healthcare</option>
                          <option value="retail">Retail</option>
                          <option value="manufacturing">Manufacturing</option>
                          <option value="technology">Technology</option>
                          <option value="other">Other</option>
                        </select>
                      </div>

                      <div>
                        <label className="block text-sm font-semibold text-gray-700 mb-2">Developers: {profile.developers}</label>
                        <input type="range" min="10" max="1000" value={profile.developers} onChange={(e) => updateProfile('developers', parseInt(e.target.value))} className="w-full" />
                      </div>

                      <div>
                        <label className="block text-sm font-semibold text-gray-700 mb-2">Annual Revenue</label>
                        <input type="text" value={`$${profile.revenue.toLocaleString()}`} onChange={(e) => updateProfile('revenue', parseInt(e.target.value.replace(/[^0-9]/g, '')) || 0)} className="w-full border-2 border-gray-300 rounded-lg px-4 py-2" />
                      </div>

                      <div>
                        <label className="block text-sm font-semibold text-gray-700 mb-2">Customers: {profile.customers.toLocaleString()}</label>
                        <input type="range" min="100" max="1000000" step="1000" value={profile.customers} onChange={(e) => updateProfile('customers', parseInt(e.target.value))} className="w-full" />
                      </div>

                      <div>
                        <label className="block text-sm font-semibold text-gray-700 mb-2">Region</label>
                        <select value={profile.region} onChange={(e) => updateProfile('region', e.target.value)} className="w-full border-2 border-gray-300 rounded-lg px-4 py-2">
                          <option value="us">United States</option>
                          <option value="europe">Europe</option>
                          <option value="asiaPacific">Asia-Pacific</option>
                          <option value="other">Other</option>
                        </select>
                      </div>

                      <div>
                        <label className="block text-sm font-semibold text-gray-700 mb-2">Regulations</label>
                        <div className="space-y-2">
                          {['gdpr', 'ccpa', 'hipaa', 'pciDss'].map(reg => (
                            <label key={reg} className="flex items-center">
                              <input type="checkbox" checked={profile.regulations.includes(reg)} onChange={() => toggleRegulation(reg)} className="mr-2" />
                              <span className="text-sm text-gray-700">{reg.toUpperCase()}</span>
                            </label>
                          ))}
                        </div>
                      </div>

                      <div>
                        <label className="block text-sm font-semibold text-gray-700 mb-2">Growth Rate: {((profile.growthRate - 1) * 100).toFixed(0)}%</label>
                        <input type="range" min="1.0" max="3.0" step="0.1" value={profile.growthRate} onChange={(e) => updateProfile('growthRate', parseFloat(e.target.value))} className="w-full" />
                      </div>
                    </div>
                  </div>
                </div>

                <div className="lg:col-span-2 space-y-8">
                  <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div className="bg-gradient-to-br from-red-50 to-white border-2 border-red-200 rounded-lg p-6">
                      <div className="text-sm font-medium text-gray-600 mb-2">Potential Breach Cost</div>
                      <div className="text-3xl font-bold text-gray-900">${(roi.breachCost / 1000000).toFixed(2)}M</div>
                      <div className="text-sm text-gray-500">Based on your profile</div>
                    </div>
                    <div className="bg-gradient-to-br from-blue-50 to-white border-2 border-blue-200 rounded-lg p-6">
                      <div className="text-sm font-medium text-gray-600 mb-2">With CodeLocker</div>
                      <div className="text-3xl font-bold text-gray-900">${(roi.expectedLossWith / 1000000).toFixed(2)}M</div>
                      <div className="text-sm text-gray-500">3-year expected loss</div>
                    </div>
                    <div className="bg-gradient-to-br from-green-50 to-white border-2 border-green-200 rounded-lg p-6">
                      <div className="text-sm font-medium text-gray-600 mb-2">Your Net ROI</div>
                      <div className="text-3xl font-bold text-gray-900">${(roi.netBenefit / 1000000).toFixed(2)}M</div>
                      <div className="text-sm text-gray-500">{roi.roiPercent.toFixed(0)}% return</div>
                    </div>
                  </div>

                  <div className="bg-white border-2 border-gray-200 rounded-lg p-6">
                    <h3 className="text-xl font-bold text-gray-900 mb-4">3-Year Projection</h3>
                    <div className="overflow-x-auto">
                      <table className="w-full text-sm">
                        <thead className="bg-gray-50">
                          <tr>
                            <th className="px-4 py-3 text-left font-semibold text-gray-900">Year</th>
                            <th className="px-4 py-3 text-left font-semibold text-gray-900">Developers</th>
                            <th className="px-4 py-3 text-left font-semibold text-gray-900">Investment</th>
                            <th className="px-4 py-3 text-left font-semibold text-gray-900">Risk (without)</th>
                            <th className="px-4 py-3 text-left font-semibold text-gray-900">Risk (with)</th>
                            <th className="px-4 py-3 text-left font-semibold text-gray-900">Net Benefit</th>
                          </tr>
                        </thead>
                        <tbody className="divide-y divide-gray-200">
                          {roi.yearlyData.map((year, idx) => (
                            <tr key={idx} className="hover:bg-gray-50">
                              <td className="px-4 py-3 font-medium text-gray-900">{year.year}</td>
                              <td className="px-4 py-3 text-gray-700">{year.developers}</td>
                              <td className="px-4 py-3 text-gray-700">${(year.investment / 1000).toFixed(0)}K</td>
                              <td className="px-4 py-3 text-red-600">${(year.riskWithout / 1000).toFixed(0)}K</td>
                              <td className="px-4 py-3 text-green-600">${(year.riskWith / 1000).toFixed(0)}K</td>
                              <td className="px-4 py-3 font-semibold text-green-700">${(year.savings / 1000).toFixed(0)}K</td>
                            </tr>
                          ))}
                          <tr className="bg-gray-50 font-bold">
                            <td className="px-4 py-3 text-gray-900">Total</td>
                            <td className="px-4 py-3"></td>
                            <td className="px-4 py-3 text-blue-700">${(roi.totalInvestment / 1000).toFixed(0)}K</td>
                            <td className="px-4 py-3 text-red-700">${(roi.expectedLossWithout / 1000).toFixed(0)}K</td>
                            <td className="px-4 py-3 text-green-700">${(roi.expectedLossWith / 1000).toFixed(0)}K</td>
                            <td className="px-4 py-3 text-green-800">${(roi.netBenefit / 1000).toFixed(0)}K</td>
                          </tr>
                        </tbody>
                      </table>
                    </div>
                  </div>

                  <div className="bg-white border-2 border-gray-200 rounded-lg p-6">
                    <h3 className="text-xl font-bold text-gray-900 mb-4">Risk Reduction</h3>
                    <div className="space-y-4">
                      <div>
                        <div className="flex justify-between text-sm mb-2">
                          <span className="font-semibold text-gray-700">Without CodeLocker</span>
                          <span className="text-red-600 font-bold">15% breach probability</span>
                        </div>
                        <div className="h-8 bg-red-100 rounded-lg flex items-center px-4">
                          <div className="h-4 bg-red-600 rounded" style={{width: '15%'}}></div>
                        </div>
                      </div>
                      <div>
                        <div className="flex justify-between text-sm mb-2">
                          <span className="font-semibold text-gray-700">With CodeLocker</span>
                          <span className="text-green-600 font-bold">3% breach probability (80% reduction)</span>
                        </div>
                        <div className="h-8 bg-green-100 rounded-lg flex items-center px-4">
                          <div className="h-4 bg-green-600 rounded" style={{width: '3%'}}></div>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            )}
          </main>

          <footer className="bg-gray-900 text-white mt-16">
            <div className="max-w-7xl mx-auto px-6 py-12">
              <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                <div>
                  <a href="https://codelocker.zevainc.com/"><h3 className="font-bold text-xl mb-4">CodeLocker by Zeva Inc.</h3></a>
                  <p className="text-gray-400 text-sm">Enterprise-grade software supply chain security powered by Zero Trust architecture.</p>
                </div>
                <div>
                  <h4 className="font-semibold mb-4">Data Sources</h4>
                  <ul className="text-sm text-gray-400 space-y-2">
                    <li>IBM Cost of Data Breach Report 2025</li>
                    <li>Verizon DBIR 2025</li>
                    <li>Coalition Cyber Claims Report 2025</li>
                    <li>CISA Cost of Cyber Incidents Study</li>
                  </ul>
                </div>
                <div>
                  <h4 className="font-semibold mb-4">Contact</h4>
                  <p className="text-sm text-gray-400 mb-4">Ready to secure your supply chain?</p>
                  <a href="https://codelocker.zevainc.com/" className="inline-block bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700">Get Started</a>
                </div>
              </div>
              <div className="border-t border-gray-800 mt-8 pt-8 text-center text-sm text-gray-500">
                <p>© 2025 <a href="https://codelocker.zevainc.com/" className="text-gray-400 hover:text-white">Zeva Inc.</a> All rights reserved.</p>
                <p className="mt-2">Columbia MSBA Capstone Project</p>
              </div>
            </div>
          </footer>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Dashboard />);
  </script>
</body>
</html>
