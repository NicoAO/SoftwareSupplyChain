    other: 1.0,

    large: 1.4,

const MITIGATION_SAVINGS = {

const CODELOCKER_PRICING = {
  tiers: [
    { min: 1, max: 100, pricePerUser: 975 },

    { min: 501, max: 1000, pricePerUser: 795 },
    { min: 1001, max: Infinity, pricePerUser: 750 },
  ],
  implementationCost: 5000,
};

const REGULATORY_FINES = {
  gdpr: { maxAmount: 20000000, percentRevenue: 0.04, likelihood: 0.75 },
  ccpa: { perRecord: 7500, likelihood: 0.60 },
  hipaa: { maxAmount: 1500000, likelihood: 0.80 },
  pciDss: { minFine: 5000, maxFine: 100000, likelihood: 0.65 },
  sox: { maxAmount: 5000000, likelihood: 0.50 },
  glba: { maxAmount: 100000, likelihood: 0.60 },
};

const RISK_REDUCTION = {
  baseline: 0.15,
  withCodeLocker: 0.03,
};

// Calculation Functions
const calculateBreachCost = (profile) => {
  let baseCost = BREACH_COSTS.attackVectors.supplyChain;
  
  const regionMultiplier = profile.region === 'us' ? 
    BREACH_COSTS.baseline.us / BREACH_COSTS.baseline.global :
    profile.region === 'europe' ?
    BREACH_COSTS.baseline.europe / BREACH_COSTS.baseline.global :
    profile.region === 'asiaPacific' ?
    BREACH_COSTS.baseline.asiaPacific / BREACH_COSTS.baseline.global : 1.0;
  
  const industryMultiplier = BREACH_COSTS.industryMultipliers[profile.industry] || 1.0;
  
  const employees = profile.developers * 8;
  const sizeMultiplier = employees < 500 ? 
    BREACH_COSTS.sizeAdjustments.small :
    employees < 5000 ?
    BREACH_COSTS.sizeAdjustments.medium :
    BREACH_COSTS.sizeAdjustments.large;
  
  let adjustedCost = baseCost * regionMultiplier * industryMultiplier * sizeMultiplier;
  
  const regulatoryFines = calculateRegulatoryFines(profile);
  adjustedCost += regulatoryFines;
  
  const lostBusinessPercent = 0.10 + (sizeMultiplier - 0.7) * 0.15;
  adjustedCost += profile.revenue * lostBusinessPercent;
  
  return adjustedCost;
};

const calculateRegulatoryFines = (profile) => {
  let totalFines = 0;
  
  if (profile.regulations.includes('gdpr')) {
    const gdprFine = Math.min(
      REGULATORY_FINES.gdpr.maxAmount,
      profile.revenue * REGULATORY_FINES.gdpr.percentRevenue
    );
    totalFines += gdprFine * REGULATORY_FINES.gdpr.likelihood;
  }
  
  if (profile.regulations.includes('ccpa')) {
    const ccpaFine = profile.customers * REGULATORY_FINES.ccpa.perRecord * 0.05;
    totalFines += ccpaFine * REGULATORY_FINES.ccpa.likelihood;
  }
  
  if (profile.regulations.includes('hipaa')) {
    totalFines += REGULATORY_FINES.hipaa.maxAmount * REGULATORY_FINES.hipaa.likelihood;
  }
  
  if (profile.regulations.includes('pciDss')) {
    totalFines += REGULATORY_FINES.pciDss.maxFine * REGULATORY_FINES.pciDss.likelihood;
  }
  
  if (profile.regulations.includes('sox')) {
    totalFines += REGULATORY_FINES.sox.maxAmount * REGULATORY_FINES.sox.likelihood;
  }
  
  if (profile.regulations.includes('glba')) {
    totalFines += REGULATORY_FINES.glba.maxAmount * REGULATORY_FINES.glba.likelihood;
  }
  
  return totalFines;
};

const calculateCodeLockerCost = (developers) => {
  const tier = CODELOCKER_PRICING.tiers.find(
    t => developers >= t.min && developers <= t.max
  );
  return developers * tier.pricePerUser;
};

const calculateROI = (profile, years = 3) => {
  const breachCost = calculateBreachCost(profile);
  const expectedLossWithout = breachCost * RISK_REDUCTION.baseline * years;
  const expectedLossWith = breachCost * RISK_REDUCTION.withCodeLocker * years;
  
  const growthRate = profile.growthRate || 1.5;
  let totalInvestment = CODELOCKER_PRICING.implementationCost;
  let currentDevs = profile.developers;
  
  const yearlyData = [];
  
  for (let year = 1; year <= years; year++) {
    const annualCost = calculateCodeLockerCost(currentDevs);
    totalInvestment += annualCost;
    
    const yearBreachCost = calculateBreachCost({...profile, developers: currentDevs});
    const yearLossWithout = yearBreachCost * RISK_REDUCTION.baseline;
    const yearLossWith = yearBreachCost * RISK_REDUCTION.withCodeLocker;
    
    yearlyData.push({
      year,
      developers: currentDevs,
      investment: annualCost,
      riskWithout: yearLossWithout,
      riskWith: yearLossWith,
      savings: yearLossWithout - yearLossWith - annualCost,
    });
    
    currentDevs = Math.floor(currentDevs * growthRate);
  }
  
  const netBenefit = (expectedLossWithout - expectedLossWith) - totalInvestment;
  const roiPercent = (netBenefit / totalInvestment) * 100;
  
  return {
    breachCost,
    expectedLossWithout,
    expectedLossWith,
    totalInvestment,
    netBenefit,
    roiPercent,
    breakEvenMonths: totalInvestment / ((expectedLossWithout - expectedLossWith) / (years * 12)),
    yearlyData,
  };
};

const AnimatedNumber = ({ value, prefix = '', suffix = '', decimals = 0 }) => {
  const [displayValue, setDisplayValue] = useState(0);
  
  useEffect(() => {
    const duration = 1500;
    const steps = 60;
    const stepValue = value / steps;
    const stepDuration = duration / steps;
    
    let current = 0;
    const timer = setInterval(() => {
      current += stepValue;
      if (current >= value) {
        setDisplayValue(value);
        clearInterval(timer);
      } else {
        setDisplayValue(current);
      }
    }, stepDuration);
    
    return () => clearInterval(timer);
  }, [value]);
  
  const formatNumber = (num) => {
    if (decimals === 0) {
      return Math.round(num).toLocaleString();
    }
    return num.toFixed(decimals).toLocaleString();
  };
  
  return <span>{prefix}{formatNumber(displayValue)}{suffix}</span>;
};

const MetricCard = ({ title, value, subtitle, trend, color = 'blue' }) => {
  const colorClasses = {
    blue: 'border-blue-500/20 bg-gradient-to-br from-blue-50 to-white',
    red: 'border-red-500/20 bg-gradient-to-br from-red-50 to-white',
    green: 'border-green-500/20 bg-gradient-to-br from-green-50 to-white',
  };
  
  return (
    <div className={`border-2 rounded-lg p-6 ${colorClasses[color]}`}>
      <div className="text-sm font-medium text-gray-600 mb-2">{title}</div>
      <div className="text-3xl font-bold text-gray-900 mb-1">{value}</div>
      {subtitle && <div className="text-sm text-gray-500">{subtitle}</div>}
      {trend && <div className={`text-sm mt-2 ${trend > 0 ? 'text-green-600' : 'text-red-600'}`}>
        {trend > 0 ? '↑' : '↓'} {Math.abs(trend)}%
      </div>}
    </div>
  );
};
